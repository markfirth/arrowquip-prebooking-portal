  if(stsel){ var sts=[]; poolAll.forEach(function(d){ if(d.loc && d.loc!=='—' && sts.indexOf(d.loc)<0) sts.push(d.loc); }); sts.sort(function(a,b){return REGION_ORDER.indexOf(a)-REGION_ORDER.indexOf(b);});
    stsel.innerHTML='<option value="">All states</option>'+sts.map(function(s){return '<option value="'+s+'"'+(poolState===s?' selected':'')+'>'+s+'</option>';}).join('');
    var sortsel=document.getElementById("poolSort"); if(sortsel) sortsel.value=poolSort; }
  if(search) pool=pool.filter(d=>d.name.toLowerCase().includes(search));
  if(poolState) pool=pool.filter(function(d){return d.loc===poolState;});
  if(poolSort==='pot_asc') pool.sort(function(a,b){return a.booking-b.booking;});
  else if(poolSort==='state') pool.sort(function(a,b){var ra=REGION_ORDER.indexOf(a.loc),rb=REGION_ORDER.indexOf(b.loc);return (ra-rb)||(b.booking-a.booking);});
  else pool.sort(function(a,b){return b.booking-a.booking;});
  document.getElementById("sbTitle").textContent="Dealer Library — "+terr;
  document.getElementById("sbSub").textContent=pool.length+" of "+poolAll.length+" dealers · click or drag + Pre-book / + Visit to schedule";
  let body="";
  if(!pool.length){ body=`<div class="poolempty">${poolAll.length?'No matches.':'No dealers in this territory yet.'}</div>`; }
  else if(poolSort==='state'){ let cur=null; pool.forEach(d=>{ if(d.loc!==cur){cur=d.loc; body+=`<div class="grp">${d.loc||'—'}</div>`;} body+=dealerCard(d); }); }
  else { body=pool.map(dealerCard).join(''); }
  document.getElementById("poolBody").innerHTML=body;
  const nums=isExp?['remote']:[31,...FIELD_NUMS,'remote'];
  /* the secondary KPI strip is gone — the primary dashboard tells the story.
     Only the quiet territory utilities live here now. */
  document.getElementById("planSummary").innerHTML=
    ((terr!=='All'&&terr!=='Master')?'<div class="tctl"><button class="tbtn" data-treset="visits" title="Remove this territory\'s Pre-book and Visit cards — library, targets and forecasts are kept">Reset visits</button><button class="tbtn" data-treset="planner" title="Remove this territory\'s cards, flights, hotels, rentals and stops — library, targets and forecasts are kept">Clear planner</button></div>':'');
  document.getElementById("weeks").innerHTML=nums.map(wk=>weekCard(wk)).join("");
}

      if(atStart&&(code.indexOf(tk)===0||icao.indexOf(tk)===0)) score+=55;
      else if(atStart) score+=30;
      else score+=6;
    }
    if(ok) scored.push([score,a]);
  }
  scored.sort(function(x,y){ return (y[0]-x[0])||x[1][1].localeCompare(y[1][1]); });
  return scored.slice(0,8).map(function(s){ var a=s[1];
    return {code:a[0],name:a[1],city:a[2],lat:a[3],lon:a[4],icao:a[5]||'',region:a[6]||''};
  });
}

/* ---- airport typeahead: one shared dropdown for every .ap-in input ----
   Delegated listeners, so re-rendered inputs need no re-wiring. Picking a
   result writes the full airport (code, name, coordinates) onto the travel
   item, or fills mobile-sheet inputs with the code. A manual-entry row covers
   airfields the directory doesn't know. */
var _apInput=null, _apResults=[];
function apInit(){
  if(apInit.done) return; apInit.done=true;
  var box=document.createElement('div'); box.id='apDrop'; box.style.display='none';

  function hide(){ box.style.display='none'; box.innerHTML=''; _apInput=null; _apResults=[]; }
  function pick(i){
    var inp=_apInput, ap=_apResults[i]; hide(); if(!inp||!ap) return;
    if(inp.dataset.tv){ setTravelAirport(inp.dataset.tv,ap); }
    else { inp.value=ap.code||ap.icao||''; inp.dispatchEvent(new Event('change',{bubbles:true})); }
  }
  function manualForm(){
    var inp=_apInput; if(!inp) return;
    box.innerHTML='<div class="apman">'
      +'<div class="apmh">Manual airport / airfield</div>'
      +'<input id="apm_name" placeholder="Airport or location name">'
      +'<input id="apm_city" placeholder="City / municipality">'
      +'<input id="apm_ctry" placeholder="Country or region">'
      +'<div class="apmrow"><input id="apm_lat" placeholder="Latitude"><input id="apm_lon" placeholder="Longitude">'
      +'<button id="apm_geo" title="Find coordinates from name + city">Locate</button></div>'
      +'<button id="apm_save">Use this airport</button>'
      +'</div>';
    var g=function(k){ var el=box.querySelector('#apm_'+k); return el?el.value.trim():''; };
    box.querySelector('#apm_geo').onclick=function(ev){ ev.preventDefault();
      geocodeAddress([g('name'),g('city'),g('ctry')].filter(Boolean).join(', '),function(res){
        if(!res){ cloudBadge('Location not found'); return; }
        box.querySelector('#apm_lat').value=res.lat.toFixed(4);
        box.querySelector('#apm_lon').value=res.lon.toFixed(4);
      });
    };
    box.querySelector('#apm_save').onclick=function(ev){ ev.preventDefault();
      var lat=parseFloat(g('lat')), lon=parseFloat(g('lon'));
      if(!g('name')){ cloudBadge('Enter a name'); return; }
      if(!isFinite(lat)||!isFinite(lon)){ cloudBadge('Coordinates needed — use Locate'); return; }
      var ap={code:'',icao:'',name:g('name'),city:g('city'),region:g('ctry'),lat:lat,lon:lon};
      var inp2=_apInput; hide();
      if(inp2&&inp2.dataset.tv) setTravelAirport(inp2.dataset.tv,ap);
    };
  }
  function show(inp){
    _apInput=inp;
    apEnsureDB(function(){ if(_apInput===inp) show(inp); });   /* lazy full-directory load */
    var rs=airportSearch(inp.value);
    _apResults=rs;
    if(!rs.length&&!inp.value.trim()){ hide(); return; }
    var status=(AP_STATE==='loading')?'<div class="apst">Loading worldwide airport directory…</div>'
              :(AP_STATE==='failed')?'<div class="apst">Offline — searching the built-in list</div>':'';
    box.innerHTML=rs.map(function(a,i){
      return '<div class="api'+(i===0?' sel':'')+'" data-i="'+i+'">'
        +'<b>'+esc(a.code||a.icao)+'</b><span class="apn">'+esc(a.name)+'</span>'
        +'<span class="apc">'+esc([a.code&&a.icao?a.icao:'',a.city,a.region].filter(Boolean).join(' · '))+'</span></div>';
    }).join('')
      +status
      +(inp.dataset.tv?'<div class="api apmanlink" data-man="1">Can’t find it? Enter manually…</div>':'');
    var r=inp.getBoundingClientRect();
    box.style.left=Math.round(Math.min(r.left,innerWidth-330))+'px';
    box.style.top=Math.round(r.bottom+2)+'px';
    box.style.minWidth=Math.max(260,Math.round(r.width))+'px';
    box.style.display='block';
  }
  document.addEventListener('input',function(e){
    var t=e.target; if(t&&t.classList&&t.classList.contains('ap-in')) show(t);
  });
  document.addEventListener('focusin',function(e){
    var t=e.target;
    if(t&&t.classList&&t.classList.contains('ap-in')){ try{t.select();}catch(_){}; if(t.value.trim())show(t); }
    else if(_apInput&&!box.contains(e.target)) hide();
  });
  document.addEventListener('keydown',function(e){
    if(!_apInput||e.target!==_apInput) return;
    var items=box.querySelectorAll('.api[data-i]'); if(!items.length) return;
    var idx=-1; items.forEach(function(x,i){ if(x.classList.contains('sel')) idx=i; });
    if(e.key==='ArrowDown'||e.key==='ArrowUp'){
      e.preventDefault();
      var ni=(e.key==='ArrowDown')?Math.min(items.length-1,idx+1):Math.max(0,idx-1);
      items.forEach(function(x,i){ x.classList.toggle('sel',i===ni); });
    } else if(e.key==='Enter'){ e.preventDefault(); pick(+(items[idx>=0?idx:0].dataset.i)); }
    else if(e.key==='Escape'){ hide(); }
  });
  document.addEventListener('pointerdown',function(e){
    var man=e.target.closest&&e.target.closest('#apDrop [data-man]');
    if(man){ e.preventDefault(); manualForm(); return; }
    if(e.target.closest&&e.target.closest('#apDrop .apman')) return;   /* typing in the manual form */
    var item=e.target.closest&&e.target.closest('#apDrop .api[data-i]');
    if(item){ e.preventDefault(); pick(+item.dataset.i); return; }
    if(_apInput&&e.target!==_apInput&&!box.contains(e.target)) hide();
  },true);
  window.addEventListener('resize',function(){ if(_apInput) hide(); });
  document.addEventListener('scroll',function(e){ if(_apInput&&!box.contains(e.target)) hide(); },true);
}

/* ---- geocoding (OpenStreetMap Nominatim). Results are cached on the item, so a
       given address is looked up once, ever. Attribution is required and shown. ---- */
var _geoBusy={};
function geocodeAddress(q,cb){
  q=(q||'').trim();
  if(!q){ cb(null); return; }
  if(_geoBusy[q]){ cb(null); return; }
  _geoBusy[q]=1;
  var url='https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=1&q='+encodeURIComponent(q);
  fetch(url,{headers:{'Accept':'application/json'}})
    .then(function(r){ return r.ok?r.json():[]; })
    .then(function(j){
      delete _geoBusy[q];
      if(j&&j[0]) cb({lat:parseFloat(j[0].lat), lon:parseFloat(j[0].lon), display:j[0].display_name});
      else cb(null);
    })
    .catch(function(){ delete _geoBusy[q]; cb(null); });
}

/* ---- model helpers ---- */
function travelType(it){ return TRAVEL_TYPES[it.type]?it.type:'other'; }
function travelHasLocation(it){
  return it.lat!=null && it.lon!=null && isFinite(it.lat) && isFinite(it.lon);
}
function travelPlaceLabel(it){
  if(travelType(it)==='flight_in'||travelType(it)==='flight_out'){
    return it.airportCode?(it.airportName||it.airportCode)+' ('+it.airportCode+')':'';
  }
  return it.name||it.address||'';
}
/* Legacy: flight/hotel/rental with a free-text label and no coordinates. */
function migrateTravel(){

  LOGI.forEach(function(it){

    if(!TRAVEL_TYPES[it.type]){ it.type='other'; changed=true; }

function setTravelField(id,field,val){

/* geocode an address field and persist coordinates */
function geocodeTravel(id){

}

/* ---------- ITINERARY + ROUTING ----------
   One chronological list per (territory, week): travel items + dealer visits.
   Legs are computed only between consecutive items that have coordinates.        */
function itineraryFor(t,wk){
  var items=[];
  mapScope(t).map(sfMasterMerge).forEach(function(d){
    if(ASSIGN[d.id]===wk){
      items.push({kind:'dealer', id:d.id, type:'dealer', name:d.name,
        address:d.address||'', lat:d.lat, lon:d.lon,
        day:(DAY[d.id]==null?null:DAY[d.id]), time:TIME[d.id]||'',
        located:(d.lat!=null&&d.lon!=null), revenue:fbWk(d,wk), loads:flWk(d,wk),
        status:(APPT[d.id]?'Confirmed':'Pending')});
    }
  });
  XVISITS.forEach(function(x){
    if(!((t==='All'||x.terr===t) && x.wk===wk)) return;
    var d=byId[x.dealer]||uniById(x.dealer); if(!d) return; var m=sfMasterMerge(d);
    items.push({kind:'xvisit', id:'xv:'+x.id, type:'dealer', name:m.name+' — '+xvType(x.type).label,
      address:m.address||'', lat:m.lat, lon:m.lon,
      day:(x.day==null?null:x.day), time:x.time||'',
      located:(m.lat!=null&&m.lon!=null), revenue:0, loads:0,
      status:(x.done?'Confirmed':'Pending')});
  });
  LOGI.forEach(function(it){
    if((t==='All'||it.terr===t) && it.wk===wk){
      var ty=travelType(it);
      items.push({kind:'travel', id:it.id, type:ty, name:travelPlaceLabel(it)||TRAVEL_TYPES[ty].label,
        address:it.address||'', lat:it.lat, lon:it.lon,
        day:(it.day==null?null:it.day), time:it.time||'',
        day2:it.day2, time2:it.time2,
        airline:it.airline, flightNo:it.flightNo, conf:it.conf, notes:it.notes,
        located:travelHasLocation(it), raw:it});
    }
  });
  items.sort(function(a,b){
    var ad=(a.day==null?99:a.day), bd=(b.day==null?99:b.day);
    return (ad-bd) || String(a.time||'zz').localeCompare(String(b.time||'zz'));
  });
  return items;
}
/* legs between consecutive LOCATED items; unlocated items break no legs, they're skipped */
function sameSpot(a,b){ return a&&b&&a.lat!=null&&b.lat!=null
  &&Math.abs(a.lat-b.lat)<0.0005&&Math.abs(a.lon-b.lon)<0.0005; }
function legsFor(items){
  var pts=items.filter(function(i){return i.located;});
  var legs=[], totalMi=0;
  for(var i=1;i<pts.length;i++){
    var a=pts[i-1], b=pts[i];
    /* identical consecutive locations: no meaningless drive */
    if(sameSpot(a,b)) continue;
    /* between every pair of differing physical stops there is a travel
       segment: airport→airport is a flight, anything else is a drive */
    var fly=(normType(a.type)==='airport'&&normType(b.type)==='airport');
    if(fly){
      var gk=(hav([a.lat,a.lon],[b.lat,b.lon])||0)*1.60934;
      legs.push({from:a, to:b, miles:gk/1.60934, km:gk, hours:gk/750+0.5, fly:true,
                 sameDay:(a.day!=null && a.day===b.day)});
      continue;                                   /* flights never count as driving */
    }
    var mi=roadMi([a.lat,a.lon],[b.lat,b.lon]);
    if(mi==null) mi=0;
    totalMi+=mi;
    legs.push({from:a, to:b, miles:mi, km:mi*1.60934, hours:mi/55, fly:false,
               sameDay:(a.day!=null && a.day===b.day)});
  }
  return {legs:legs, totalMi:totalMi, totalKm:totalMi*1.60934, totalHours:totalMi/55,
          unlocated:items.filter(function(i){return !i.located;}).length};
}
function legLabel(l){
  if(l.fly) return 'Flight · ~'+hrsLabel(l.hours);
  return 'Drive · '+Math.round(l.km)+' km · '+hrsLabel(l.hours);
}

      +'<button class="tv-geo" data-tvgeo="'+it.id+'" title="Find coordinates from the address">Locate</button>'
      +'</div>';

function weekCard(wk){
  var isk=wk===31, isRemote=wk==='remote';
  var ds=dealersIn(terr).filter(function(d){return ASSIGN[d.id]===wk;}).sort(function(a,b){return b.booking-a.booking;});
  var wf=wkForecast(terr,wk);
  var rev=wf.b,loads=wf.l,pct=ttOf(terr)?rev/ttOf(terr)*100:0, apc=apptCount(ds);
  var ckey=terr+'|'+wk; var confirmed=!!CONF[ckey];
  var title=isRemote?'REMOTE / DIRECT':(isk?'WK 31 · KICKOFF':'WK '+wk+' – 2026');
  var dates=isRemote?'book remotely':(WEEKDATES[wk]+', 2026');
  var md=settingsFor(terr).maxDrive;
  var wlogi=LOGI.filter(function(x){return x.terr===terr && x.wk===wk;});
  var xw=(typeof wk==='number')?XVISITS.filter(function(x){return x.terr===terr && x.wk===wk;}):[];
  var cards;
  if(isRemote){ cards=(ds.length||wlogi.length)?(ds.sort(function(a,b){return b.booking-a.booking;}).map(function(d){return dvCard(dvViewInitial(d,wk));}).join('')+wlogi.map(function(x){return travelCard(x,wk);}).join('')):'<div class="dcempty">drag + Pre-book here from the library</div>'; }
  else {
    var labs=dayLabels(wk); cards='';
    if(!ds.length && !wlogi.length && !xw.length) cards+='<div class="dcempty">drag + Pre-book or + Visit here from the library</div>';
    /* one ordered, located stop sequence for the whole week: the single
       source of truth for the travel rows woven between the cards below */
    var seq=wkStopSeq(terr,wk);
    var seqIdx={}; seq.forEach(function(s,i){ seqIdx[s.key]=i; });
    var entryKey=function(e){ return e.k==='v'?('d:'+e.d.id):(e.k==='x'?('x:'+e.x.id):('m:'+e.x.id)); };
    var legBefore=function(e){
      var i=seqIdx[entryKey(e)];
      if(i==null||i===0) return '';
      return legRowHTML(seq[i-1],seq[i],wk);
    };
    var nodv=ds.filter(function(d){return DAY[d.id]==null||DAY[d.id]>=labs.length;}).map(function(d){return {k:'v',d:d};});
    var nodl=wlogi.filter(function(x){return x.day==null||x.day>=labs.length;}).map(function(x){return {k:'l',x:x};});
    var nodx=xw.filter(function(x){return x.day==null||x.day>=labs.length;}).map(function(x){return {k:'x',x:x};});
    var nod=nodv.concat(nodl).concat(nodx);
    if(nod.length){ cards+='<div class="kday todo">Needs a day</div>'
      +'<div class="kdaybody" data-drop="'+wk+'|none">'
      +nod.map(function(e){return e.k==='v'?dvCard(dvViewInitial(e.d,wk)):(e.k==='x'?dvCard(dvViewX(e.x)):travelCard(e.x,wk));}).join('')+'</div>'; }
    labs.forEach(function(l,i){
      var ev=ds.filter(function(d){return DAY[d.id]===i;}).map(function(d){return {k:'v',d:d,t:TIME[d.id]||'99'};});
      var el=wlogi.filter(function(x){return x.day===i;}).map(function(x){return {k:'l',x:x,t:x.time||'99'};});
      var ex=xw.filter(function(x){return x.day===i;}).map(function(x){return {k:'x',x:x,t:x.time||'99'};});
      var entries=ev.concat(el).concat(ex).sort(function(a,b){return a.t.localeCompare(b.t);});
      cards+='<div class="kday"><b>'+l[0]+'</b> '+l[1]+'</div>';
      /* each day is its own drop zone — the card's day comes from where it sits */
      cards+='<div class="kdaybody" data-drop="'+wk+'|'+i+'">';
      if(!entries.length){ cards+='<div class="dcempty">—</div>'; }
      else entries.forEach(function(e){
        cards+=legBefore(e);
        cards+=(e.k==='v'?dvCard(dvViewInitial(e.d,wk)):(e.k==='x'?dvCard(dvViewX(e.x)):travelCard(e.x,wk)));
      });
      cards+='</div>';
    });
  }
  var confBtn='<button class="confbtn '+(confirmed?'on':'')+'" data-conf="'+ckey+'">'+(confirmed?'Confirmed ✓':'Confirm week')+'</button>';

/* ============ THE dealer scheduling card ============
   ONE component for every Pre-book and every Visit, everywhere. The badge
   (blue PRE-BOOK / green VISIT) is the first visual signal; everything else
   is identical. All fields edit inline on the card — there is no edit modal.
   A card's type is chosen at creation and never changes.
   ref: 'i:<dealerId>' = the dealer's initial card (ASSIGN/DAY/TIME/DUR/STOPX)
        'x:<visitId>'  = an additional card (its XVISITS record)            */
var VBADGE={
  prebook:{label:'PRE-BOOK',cls:'pre',icon:'<svg viewBox="0 0 12 12" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1.5" y="2.5" width="9" height="8" rx="1"/><path d="M1.5 5h9M4 1v2.5M8 1v2.5"/></svg>'},
  visit  :{label:'VISIT',cls:'vis',icon:'<svg viewBox="0 0 12 12" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M6 11S2 7.4 2 4.8A4 4 0 0 1 10 4.8C10 7.4 6 11 6 11z"/><circle cx="6" cy="4.8" r="1.3"/></svg>'}
};
/* flexible duration: "45m", "1h 30m", "8h", "2:30", "36h", bare numbers
   (≤12 = hours, otherwise minutes). Normalized to whole minutes, min 15. */
function parseDur(s){
  s=String(s||'').trim().toLowerCase().replace(/\s+/g,' ');
  if(!s) return null;
  var m;
  if((m=s.match(/^(\d+(?:\.\d+)?) ?h(?:ours?|rs?)? ?(?:(\d+) ?m(?:ins?)?)?$/))) return Math.round(parseFloat(m[1])*60+(m[2]?+m[2]:0));
  if((m=s.match(/^(\d+(?:\.\d+)?) ?m(?:ins?|inutes?)?$/))) return Math.round(parseFloat(m[1]));
  if((m=s.match(/^(\d+):([0-5]\d)$/))) return (+m[1])*60+(+m[2]);
  if((m=s.match(/^(\d+(?:\.\d+)?)$/))){ var n=parseFloat(m[1]); return Math.round(n<=12?n*60:n); }
  if((m=s.match(/^(\d+(?:\.\d+)?) ?d(?:ays?)?$/))) return Math.round(parseFloat(m[1])*1440);
  return null;
}
function normDur(mins){ mins=Math.round(+mins); if(!isFinite(mins)||mins<=0) return null; return Math.max(15,mins); }
/* normalized view of one card */
function dvViewInitial(d,wk){

/* one writer for every inline field on either card kind */
function setVisitField(ref,f,val){
  var kind=ref.slice(0,1), id=ref.slice(2);
  if(kind==='i'){
    if(f==='wk'){ var prev=ASSIGN[id]; ASSIGN[id]=(val==='remote')?'remote':parseInt(val,10); if(ASSIGN[id]!==prev) DAY[id]=null; }
    else if(f==='day') DAY[id]=(val===''?null:parseInt(val,10));
    else if(f==='time') TIME[id]=val;
    else if(f==='dur'){ var n=normDur(parseDur(val)); if(n==null) return false; DUR[id]=n; }
    else if(f==='notes'){ var s=STOPX[id]=STOPX[id]||{}; s.notes=val; }
  } else {
    var x=XVISITS.filter(function(v){return v.id===id;})[0]; if(!x) return false;
    if(f==='wk'){ var nw=parseInt(val,10); if(!isFinite(nw)) return false; if(x.wk!==nw) x.day=null; x.wk=nw; }
    else if(f==='day') x.day=(val===''?null:parseInt(val,10));
    else if(f==='time') x.time=val;
    else if(f==='dur'){ var n2=normDur(parseDur(val)); if(n2==null) return false; x.dur=n2; }
    else if(f==='notes') x.notes=val;
  }
  savePlan(); return true;
}
function toggleVisitConf(ref){
  var kind=ref.slice(0,1), id=ref.slice(2);
  var dealerId, isPB;
  if(kind==='i'){ dealerId=id; isPB=(vType(id)==='prebook'); APPT[id]=!APPT[id]; if(!APPT[id])delete APPT[id]; }
  else { var x=XVISITS.filter(function(v){return v.id===id;})[0]; if(!x) return; dealerId=x.dealer; isPB=(x.type!=='visit'); x.done=!x.done; }
  /* Pre-book confirmations write the commitment ledger; Visit confirmations
     only track the appointment and never touch financial totals */
  if(isPB) syncCommitments(dealerId);
  savePlan(); refreshPlanner();
}
/* delete ONE card. The dealer always stays in the library; any tasks on an
   additional card move to dealer level so nothing is silently lost. */
function deleteVisit(ref){
  var kind=ref.slice(0,1), id=ref.slice(2);
  if(kind==='i'){
    var d=uniById(id);
    ASSIGN[id]=(d&&d.territory==='Exports')?'remote':'pool';
    DAY[id]=null; TIME[id]=''; delete PTYPE[id];
    if(d&&d.territory==='Exports') ASSIGN[id]='pool';
  } else {
    var x=XVISITS.filter(function(v){return v.id===id;})[0]; if(!x) return;
    if((x.tasks||[]).length){ var s=STOPX[x.dealer]=STOPX[x.dealer]||{}; s.tasks=(s.tasks||[]).concat(x.tasks); }
    XVISITS=XVISITS.filter(function(v){return v.id!==x.id;});
  }
  savePlan(); refreshPlanner();
}
/* create a card. Type is chosen here and is permanent for the card's life.
   day is optional — set when the card was dropped/placed on a specific day. */
function createVisit(dealerId,type,wk,day){
  var d=uniById(dealerId); if(!d) return;
  if(wk!=='remote'&&!isFinite(parseInt(wk,10))) return;
  type=(type==='visit')?'visit':'prebook';
  day=(day==null||day===''||day==='none')?null:parseInt(day,10);
  if(day!=null&&!isFinite(day)) day=null;
  if(ASSIGN[dealerId]==='pool'||ASSIGN[dealerId]==null){
    ASSIGN[dealerId]=(wk==='remote')?'remote':parseInt(wk,10);
    DAY[dealerId]=day; TIME[dealerId]='';
    if(type==='visit') PTYPE[dealerId]='visit'; else delete PTYPE[dealerId];
  } else {
    if(wk==='remote') return;
    XVISITS.push({id:'X'+Date.now()+Math.floor(Math.random()*1000), dealer:dealerId,
      terr:(d.territory==='Exports'?'Exports':(d.territory||((terr!=='All'&&terr!=='Master')?terr:'East'))),
      wk:parseInt(wk,10), day:day, time:'', dur:60, type:type, notes:'', done:false});
  }
  savePlan(); refreshPlanner();
}

/* =================== ALL territory — executive planning view ================ */
const AREA_CODE={East:'E',South:'S',Central:'C',West:'W',Exports:'X'};
let ALL_WK='all';   /* 'all' or a week number — ONE filter state shared by Overview and Map */
let LV_TYPES={dealer:true,hotel:true,airport:true,rental:true,other:true,routes:true};
function allAreas(){ return TERRS.filter(function(t){ return LV_AREAS[t]; }); }
function allWeeksList(){ return [31].concat(FIELD_NUMS); }
function allVisits(wk){
  var out=[]; allAreas().forEach(function(t){ dealersIn(t).forEach(function(d){ if(ASSIGN[d.id]===wk) out.push({t:t,d:d}); }); });
  /* additional visits appear as their own entries (0 revenue/loads: no double count) */
  XVISITS.forEach(function(x){
    if(x.wk!==wk||!LV_AREAS[x.terr]) return;
    var d=byId[x.dealer]||uniById(x.dealer); if(!d) return;
    out.push({t:x.terr, d:{id:d.id,name:d.name+' · '+xvType(x.type).label,booking:0,loads:0}, xv:x});
  });

function avDay(v){ return v.xv?v.xv.day:DAY[v.d.id]; }
function avTime(v){ return v.xv?(v.xv.time||''):(TIME[v.d.id]||''); }
function avConf(v){ return v.xv?!!v.xv.done:!!APPT[v.d.id]; }
function allFiltersHTML(){

/* dealer-unique $/loads for the ALL views: one week = that week's attribution,
   the full span = every pre-booked dealer once. Never a per-card sum. */
function allForecast(wks){
  var single=(wks&&wks.length===1)?wks[0]:null;
  var st={rev:0,loads:0,confRev:0,per:{}};
  allAreas().forEach(function(t){
    var p={rev:0,loads:0};
    dealersIn(t).forEach(function(d){
      p.rev+=(single!=null?fbWk(d,single):fcB(d));
      p.loads+=(single!=null?flWk(d,single):fcL(d));
      if(pbConfirmed(d.id)&&(single!=null?pbWeek(d.id)===single:hasPB(d.id))) st.confRev+=(+d.booking||0);
    });
    st.per[t]=p; st.rev+=p.rev; st.loads+=p.loads;
  });
  return st;
}
function allKpiHTML(){
  var wks=(ALL_WK==='all')?allWeeksList():[ALL_WK];

  wks.forEach(function(wk){ allVisits(wk).forEach(function(v){ n++; if(avConf(v))conf++; }); });
  var af=allForecast(wks);
  var kpi=function(k,v){ return '<div class="lvkpi"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>'; };
  return '<div class="lvkpis">'+kpi('Visits',n)+kpi('Loads',af.loads)+kpi('Revenue',fmtUSDk(af.rev))

/* ALL Overview uses the EXACT territory-planner Kanban: the same .wkcard week
   columns, black .wkhead, .kday day rows, pills and scroll behaviour — only the
   contents aggregate every selected area, as compact read-only dealer tags. */
function allWeekCard(wk){
  var isk=(wk==='remote')?false:(wk===31), isRemote=(wk==='remote');
  var vs=[];
  if(isRemote){ allAreas().forEach(function(t){ dealersIn(t).forEach(function(d){ if(ASSIGN[d.id]==='remote') vs.push({t:t,d:d}); }); }); }
  else vs=allVisits(wk);
  var wkKey=isRemote?'remote':wk;
  var rev=0,loads=0;
  allAreas().forEach(function(t){ dealersIn(t).forEach(function(d){ rev+=fbWk(d,wkKey); loads+=flWk(d,wkKey); }); });
  var apc=vs.filter(avConf).length;
  var pct=vs.length?Math.round(apc/vs.length*100):0;
  var title=isRemote?'REMOTE / DIRECT':(isk?'WK 31 · KICKOFF':'WK '+wk+' – 2026');
  var dates=isRemote?'book remotely':(WEEKDATES[wk]+', 2026');
  var tags=function(list){ return '<div class="atags">'+list.map(function(v){return allTagHTML(v.t,v.d,avConf(v));}).join('')+'</div>'; };
  var cards='';
  if(isRemote){
    cards=vs.length?tags(vs):'<div class="dcempty">no remote dealers</div>';
  } else if(!vs.length){
    cards='<div class="dcempty">no visits planned</div>';
  } else {
    var labs=dayLabels(wk);
    var nod=vs.filter(function(v){return avDay(v)==null||avDay(v)>=labs.length;});
    if(nod.length){ cards+='<div class="kday todo">Needs a day</div>'+tags(nod); }
    labs.forEach(function(l,i){
      var dd=vs.filter(function(v){return avDay(v)===i;}).sort(function(a,b){return (avTime(a)||'99').localeCompare(avTime(b)||'99');});
      var areas={}; dd.forEach(function(v){areas[v.t]=1;}); var an=Object.keys(areas).length;
      cards+='<div class="kday"><b>'+l[0]+'</b> '+l[1]
        +(dd.length?('<span class="kdsub">'+dd.length+' appt'+(dd.length!==1?'s':'')+' • '+an+' area'+(an!==1?'s':'')+'</span>'):'')+'</div>';
      cards+= dd.length?tags(dd):'<div class="dcempty">—</div>';
    });
  }
  return '<div class="wkcard'+(isk?' kick':'')+'">'
    +'<div class="wkhead"><div class="wl">'+title+'</div>'
    +'<div class="kpills"><span class="kpill target">Loads: '+loads+'</span><span class="kpill total">'+fmtUSD(rev)+'</span><span class="kpill sub">'+apc+'/'+vs.length+' appts · '+pct+'%</span></div></div>'
    +'<div class="wmeta"><div><b>Dates:</b> '+dates+'</div><div><b>Dealers:</b> '+vs.length+' &nbsp;·&nbsp; <b>Loads:</b> '+loads+'</div></div>'
    +'<div class="kbody">'+cards+'</div></div>';
}

function allDrawMap(){
  var el=document.getElementById('leaderMap'); if(!el||typeof L==='undefined')return;
  if(_lvMap){ try{_lvMap.remove();}catch(e){} _lvMap=null; }
  _lvMap=L.map(el,{zoomControl:true,scrollWheelZoom:true,preferCanvas:true}).setView([45,-98],4);
  var gen=++_aqMapGen; _lvMap._aqGen=gen;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OpenStreetMap'}).addTo(_lvMap);
  var wks=(ALL_WK==='all')?allWeeksList():[ALL_WK];
  var bounds=[], legs=[], flyHrs=0;
  function typeKey(s){ var ty=normType(s.type); if(ty==='meal'||ty==='fuel'||ty==='other')return 'other'; return ty; }
  allAreas().forEach(function(t){
    var col=AREA_COLOR[t], rep=FLAT.tm[t]||'';

      var all=stopsForWeek(t,wk).filter(function(s){ return s.lat!=null&&s.lon!=null&&isFinite(s.lat)&&isFinite(s.lon); });
      var stops=all.filter(function(s){ return LV_TYPES[typeKey(s)]!==false; });

          .bindTooltip(stopTip(s)+'<br>Week '+wk+' · '+esc([rep,t].filter(Boolean).join(' · '))).bindPopup(popupHTML(s));
        bounds.push([s.lat,s.lon]);

        for(var i=1;i<all.length;i++){

          var fly=(normType(a.type)==='airport'&&normType(b.type)==='airport');

    routeStatusCtl(_lvMap,gen,rs,allDrawMap);
  });

function mapHTML(tl, weekSel, colorBy){
  colorBy=colorBy||'terr';
  var W=940,H=560,PAD=18;
  var LON0=-125,LON1=-66,LAT0=53,LAT1=24.5;
  var sx=(W-2*PAD)/(LON1-LON0), sy=(H-2*PAD)/(LAT0-LAT1);
  function proj(lon,lat){return [PAD+(lon-LON0)*sx, PAD+(LAT0-lat)*sy];}
  var op=''; NA_OUTLINE.forEach(function(pt,i){var xy=proj(pt[0],pt[1]); op+=(i?'L':'M')+xy[0].toFixed(1)+' '+xy[1].toFixed(1)+' ';}); op+='Z';
  var svg='<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" font-family="Open Sans, sans-serif">';

    total+=ds.length;

    Object.keys(byWk).forEach(function(k){ var g=byWk[k];
      g.sort(function(a,b){return ((DAY[a.id]==null?9:DAY[a.id])-(DAY[b.id]==null?9:DAY[b.id]))||((TIME[a.id]||'99').localeCompare(TIME[b.id]||'99'));});

      var pts=g.map(function(d){var j=jit(d.id); var xy=proj(d.lon+j[1],d.lat+j[0]); return {d:d,x:xy[0],y:xy[1]};});
      /* one element PER LEG so each segment routes and hovers individually */

        svg+='<polyline class="svgleg" data-al="'+A.d.lat+'" data-an="'+A.d.lon+'" data-bl="'+B.d.lat+'" data-bn="'+B.d.lon+'"'
          +' data-from="'+esc(A.d.name)+'" data-to="'+esc(B.d.name)+'" data-terr="'+t+'" data-rep="'+esc(FLAT.tm[t]||'')+'" data-day="'+esc(dayTimeLabel(B.d))+'"'
          +' points="'+A.x.toFixed(1)+','+A.y.toFixed(1)+' '+B.x.toFixed(1)+','+B.y.toFixed(1)+'"'
          +' fill="none" stroke="'+col+'" stroke-width="1.7" opacity="0.55" pointer-events="stroke">'
          +'<title>'+esc(A.d.name)+' → '+esc(B.d.name)+' · Drive · route loading… · '+t+'</title></polyline>';
      }
      pts.forEach(function(p){var ok=!!APPT[p.d.id]; var dt=dayTimeLabel(p.d); var wlab=(weekSel==='all'&&colorBy!=='week')?('W'+k+' '):'';

/* ===================== TRIP PLANS — MAP VIEW =====================
   A trip is (territory, week). Stops are the union of:
     - dealer stops, derived from ASSIGN/DAY/TIME (never mutated here)
     - manual stops, stored on LOGI records
   Budget / daily breakdown / report all aggregate over that same union. */
const STOP_TYPES={
  dealer :{label:'Dealer' ,color:'#2563eb',glyph:'',   cat:'Other'},
  hotel  :{label:'Hotel'  ,color:'#7c3aed',glyph:'H',  cat:'Hotel'},
  airport:{label:'Airport',color:'#2563eb',glyph:'✈', cat:'Flights'},
  meal   :{label:'Meal'   ,color:'#d97706',glyph:'M',  cat:'Food'},
  fuel   :{label:'Fuel'   ,color:'#ea580c',glyph:'F',  cat:'Fuel'},
  rental :{label:'Rental' ,color:'#16a34a',glyph:'C',  cat:'Car Rental'},
  other  :{label:'Other'  ,color:'#6b7280',glyph:'',   cat:'Other'}
};
/* Budget categories, exactly as specified. Dealer visits are NOT expenses and never
   appear here — the budget is derived solely from EXPENSES, never from stops. */
const BUDGET_CATS=['Flights','Hotels','Food','Fuel','Rental Cars','Parking / Tolls','Other'];
/* legacy category names that predate this list */
const CAT_ALIASES={'Hotel':'Hotels','Car Rental':'Rental Cars','Flight':'Flights','Parking':'Parking / Tolls'};
function normCat(c){ c=CAT_ALIASES[c]||c; return BUDGET_CATS.indexOf(c)>=0 ? c : 'Other'; }
let MAPF={};
let SIDEBAR_TAB='overview';   /* overview | budget | files */
/* legacy LOGI types predate this view: flight -> airport */
/* map the location-based travel types onto the map's pin vocabulary */
const MAP_PIN={flight_in:'airport',flight_out:'airport',rental_pickup:'rental',rental_return:'rental',
  hotel:'hotel',fuel:'fuel',food:'meal',parking:'other',other:'other',
  flight:'airport',rental:'rental'};   /* last two: legacy records, pre-migration */
function normType(t){ if(MAP_PIN[t]) return MAP_PIN[t]; return STOP_TYPES[t]?t:'other'; }
function money(n){ n=Number(n)||0; return (n<0?'-$':'$')+Math.abs(n).toFixed(2); }
function num(v){ var n=parseFloat(v); return isFinite(n)?n:0; }
/* 'All' has no dealersIn() bucket - union every territory so the map works there too */
function mapScope(t){ return t==='All' ? TERRS.reduce(function(a,x){return a.concat(dealersIn(x));},[]) : dealersIn(t); }
function poolFiltered(t){
  var q=(MAPF.q||'').toLowerCase();
  return mapScope(t).filter(function(d){
    if(MAPF.state && d.loc!==MAPF.state) return false;
    if(MAPF.county && (d.county||'')!==MAPF.county) return false;
    if(MAPF.tier && d.tier!==MAPF.tier) return false;
    if(MAPF.tm && d.tm!==MAPF.tm) return false;
    if(MAPF.status && (d.status||'')!==MAPF.status) return false;
    if(q && (d.name||'').toLowerCase().indexOf(q)<0) return false;
    return true;
  });
}
/* Stops carry NO cost fields. A dealer visit is a visit, not a line of spend. */
function dealerStop(d,wk){

/* ---------------- Manual expenses (plan JSON) ---------------- */
function expensesFor(t,wk){
  return EXPENSES.filter(function(e){ return (t==='All'||e.terr===t) && e.wk===wk; });
}
function addExpense(t,wk,o){

    cat:normCat(o.cat), vendor:o.vendor||'', date:(o.date===''||o.date==null)?null:parseInt(o.date,10),
    amount:num(o.amount), isEst:!!o.isEst, notes:o.notes||''});

function setExpenseField(id,field,val){

  if(field==='amount') e.amount=num(val);
  else if(field==='isEst') e.isEst=(val===true||val==='true'||val==='estimate');
  else if(field==='cat') e.cat=normCat(val);

/* Sorted by day then time; undated stops sink to the bottom but still count in budgets. */
function stopsForWeek(t,wk){
  var out=[];
  if(typeof wk==='number'){
    var allowed={}; poolFiltered(t).forEach(function(d){allowed[d.id]=1;});
    mapScope(t).map(sfMasterMerge).forEach(function(d){ if(ASSIGN[d.id]===wk && allowed[d.id]) out.push(dealerStop(d,wk)); });
    LOGI.forEach(function(it){ if((t==='All'||it.terr===t) && it.wk===wk) out.push(manualStop(it,wk)); });
    /* additional visits: independent stops at the dealer's location on their own
       date. revenue/loads stay 0 so week totals are never double-counted. */
    XVISITS.forEach(function(x){
      if(!((t==='All'||x.terr===t) && x.wk===wk)) return;
      var d=byId[x.dealer]||uniById(x.dealer); if(!d) return; d=sfMasterMerge(d);
      var labs=dayLabels(wk);
      out.push({key:'x:'+x.id, id:x.dealer, kind:'xvisit', name:d.name+' — '+xvType(x.type).label, type:'dealer',
        dayIdx:(x.day==null?null:x.day), dayLabel:(x.day!=null&&labs[x.day])?(labs[x.day][0]+', '+labs[x.day][1]):'—',
        time:x.time||'', address:d.address||'', city:'', state:d.loc||'', county:'',
        lat:d.lat, lon:d.lon, status:(x.done?'Confirmed':'Pending'), notes:x.notes||'', conf:'',
        ptype:xvTypeKey(x.type), loads:0, revenue:0});
    });
  }
  out.sort(function(a,b){
    var ad=(a.dayIdx==null?99:a.dayIdx), bd=(b.dayIdx==null?99:b.dayIdx);
    return (ad-bd) || String(a.time||'zz').localeCompare(String(b.time||'zz'));
  });
  return out;
}
/* Budget derives from manual expenses only. Estimate and actual are separate rows in
   the same category, which is what makes variance and "estimate with no actual" fall out. */
function budgetFor(expenses){
  var rows={}; BUDGET_CATS.forEach(function(c){rows[c]={est:0,act:0,receipts:0};});
  (expenses||[]).forEach(function(e){
    var c=normCat(e.cat); if(!rows[c])rows[c]={est:0,act:0,receipts:0};
    if(e.isEst) rows[c].est+=num(e.amount); else rows[c].act+=num(e.amount);
    /* receipts stay 0 until the Travel Wallet is enabled behind real auth */
  });
  var tot={est:0,act:0,receipts:0};
  BUDGET_CATS.forEach(function(c){tot.est+=rows[c].est; tot.act+=rows[c].act;});
  return {rows:rows,total:tot};
}
function dailyFor(stops,wk){
  var labs=dayLabels(wk), days=labs.map(function(l,i){return {i:i,label:l[0]+' · '+l[1],total:0,items:[]};});
  /* daily cost comes from expense dates; stops contribute presence, not money */
  (arguments[2]||[]).forEach(function(e){
    if(e.date!=null && days[e.date]){
      if(!e.isEst) days[e.date].total+=num(e.amount);
      days[e.date].items.push({name:(e.vendor||normCat(e.cat)), amount:num(e.amount), isEst:e.isEst});
    }
  });
  stops.forEach(function(s){ if(s.dayIdx!=null && days[s.dayIdx]) days[s.dayIdx].stops=(days[s.dayIdx].stops||0)+1; });
  return days;
}
/* Great-circle * 1.2 between consecutive located stops - the same estimator the planner uses. */
function routeMetrics(stops){
  var pts=stops.filter(function(s){return s.lat!=null&&s.lon!=null;});
  var mi=0; for(var i=1;i<pts.length;i++){ var m=roadMi([pts[i-1].lat,pts[i-1].lon],[pts[i].lat,pts[i].lon]); if(m)mi+=m; }
  return {miles:mi, km:mi*1.60934, hours:mi/55};
}

function varCls(v){ return v<-0.005?'var-pos':(v>0.005?'var-neg':'var-zero'); }

/* ---------- road routing (OSRM) ----------
   Ground legs follow real roads: geometry comes from the public OSRM router and
   is cached (memory + localStorage), so each leg is fetched once. Nothing is
   drawn until real road geometry is ready — never a straight placeholder line.
   Airport→airport legs are flights, drawn immediately as a thin dotted arc. */
var _rtMem={}, _rtQ=[], _rtBusy=0, _aqMapGen=0;
function _rtStore(){ try{ return JSON.parse(localStorage.getItem('aqRoutes_v1')||'{}'); }catch(e){ return {}; } }
function _rtPersist(k,v){ try{
  /* geometry is stored EXACTLY as the engine returned it; very long routes are
     kept in memory only so the cache never blows the localStorage quota */
  if(JSON.stringify(v).length>30000) return;
  var s=_rtStore(); s[k]=v;
  var ks=Object.keys(s); if(ks.length>300){ ks.slice(0,ks.length-300).forEach(function(x){ delete s[x]; }); }
  localStorage.setItem('aqRoutes_v1',JSON.stringify(s));
}catch(e){ try{ localStorage.removeItem('aqRoutes_v1'); }catch(e2){} } }
var _rtPending={};   /* leg key -> in-flight promise (dedupes concurrent maps) */
var _rtDead={};      /* router index -> consecutive failures; 2+ = skip this session */
function roadRoute(a,b){ /* [lat,lon],[lat,lon] -> Promise<{pts,km,min}|null> */
  var ka=a[0].toFixed(3)+','+a[1].toFixed(3), kb=b[0].toFixed(3)+','+b[1].toFixed(3);
  if(ka===kb) return Promise.resolve({pts:[a,b],km:0,min:0});   /* same spot: no network call */
  var k=ka+'|'+kb;
  if(_rtMem[k]) return Promise.resolve(_rtMem[k]);
  var st=_rtStore(); if(st[k]){ _rtMem[k]=st[k]; return Promise.resolve(st[k]); }
  if(_rtPending[k]) return _rtPending[k];
  _rtPending[k]=new Promise(function(res){ _rtQ.push({k:k,a:a,b:b,res:res}); _rtPump(); });
  _rtPending[k].then(function(){ delete _rtPending[k]; },function(){ delete _rtPending[k]; });
  return _rtPending[k];
}
var _RT_OSRM=['https://router.project-osrm.org','https://routing.openstreetmap.de/routed-car'];
function decodePoly6(str){ /* Valhalla encoded polyline, 1e-6 precision */
  var pts=[],i=0,lat=0,lon=0;
  while(i<str.length){
    var b,sh=0,r=0;
    do{ b=str.charCodeAt(i++)-63; r|=(b&0x1f)<<sh; sh+=5; }while(b>=0x20);
    lat+=((r&1)?~(r>>1):(r>>1)); sh=0; r=0;
    do{ b=str.charCodeAt(i++)-63; r|=(b&0x1f)<<sh; sh+=5; }while(b>=0x20);
    lon+=((r&1)?~(r>>1):(r>>1));
    pts.push([lat/1e6,lon/1e6]);
  }
  return pts;
}
function _rtFetch(url,opts){ /* fetch with an 8s abort so a dead router can't stall the queue */
  var ctl=(typeof AbortController!=='undefined')?new AbortController():null;
  if(ctl){ opts=opts||{}; opts.signal=ctl.signal; setTimeout(function(){ try{ctl.abort();}catch(e){} },8000); }
  return fetch(url,opts);
}
function _rtPump(){
  if(_rtBusy>=2||!_rtQ.length) return;
  var j=_rtQ.shift(); _rtBusy++;
  var done=function(out){
    if(out){ _rtMem[j.k]=out; _rtPersist(j.k,out); }   /* geometry kept exactly as returned */
    _rtBusy--; setTimeout(_rtPump,120); try{ j.res(out); }catch(e){}
  };
  function tryOSRM(i){
    if(i>=_RT_OSRM.length){ tryValhalla(); return; }
    if((_rtDead[i]||0)>=2){ tryOSRM(i+1); return; }   /* unreachable this session: don't pay the timeout again */
    var url=_RT_OSRM[i]+'/route/v1/driving/'
      +j.a[1]+','+j.a[0]+';'+j.b[1]+','+j.b[0]+'?overview=full&geometries=geojson&alternatives=false&steps=false';
    _rtFetch(url).then(function(r){ return r.ok?r.json():null; }).then(function(x){
      var rt=x&&x.routes&&x.routes[0];
      if(rt&&rt.geometry&&rt.geometry.coordinates&&rt.geometry.coordinates.length>1){
        _rtDead[i]=0;
        done({pts:rt.geometry.coordinates.map(function(c){ return [c[1],c[0]]; }), km:rt.distance/1000, min:rt.duration/60});
      } else tryOSRM(i+1);
    }).catch(function(){ _rtDead[i]=(_rtDead[i]||0)+1; tryOSRM(i+1); });
  }
  function tryValhalla(){
    _rtFetch('https://valhalla1.openstreetmap.de/route',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({locations:[{lat:j.a[0],lon:j.a[1]},{lat:j.b[0],lon:j.b[1]}],
        costing:'auto', directions_options:{units:'kilometers'}})
    }).then(function(r){ return r.ok?r.json():null; }).then(function(x){
      var trip=x&&x.trip, leg=trip&&trip.legs&&trip.legs[0];
      if(leg&&leg.shape){ done({pts:decodePoly6(leg.shape), km:trip.summary.length, min:trip.summary.time/60}); }
      else done(null);
    }).catch(function(){ done(null); });
  }
  tryOSRM(0);
}
function flightArc(a,b){ /* gently curved flight path between two points */
  var mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2;
  var dx=b[0]-a[0], dy=b[1]-a[1], d=Math.sqrt(dx*dx+dy*dy)||1;
  var cx=mx-dy/d*d*0.18, cy=my+dx/d*d*0.18;   /* control point offset ~18% of span */
  var pts=[]; for(var i=0;i<=24;i++){ var t=i/24, u=1-t;
    pts.push([u*u*a[0]+2*u*t*cx+t*t*b[0], u*u*a[1]+2*u*t*cy+t*t*b[1]]); }
  return pts;
}
function legTip(meta,km,min){
  var h='<b>'+esc(meta.from)+'</b><br><span class="lt-arr">↓</span> <b>'+esc(meta.to)+'</b>';
  if(km!=null) h+='<br>'+Math.round(km)+' km · ~'+fmtDur(min);
  h+='<br>'+(meta.fly?'Flight':'Drive');
  if(meta.day) h+='<br>'+esc(meta.day)+(meta.time?(' · '+t12s(meta.time)):'');
  if(meta.rep||meta.area) h+='<br>'+[meta.rep,meta.area].filter(Boolean).map(esc).join(' · ');
  return h;
}
/* the visible route stays thin; an invisible fat twin catches hovers nearby */
function legHover(map,pts,tip){
  var hot=L.polyline(pts,{color:'#000',weight:18,opacity:0.001,interactive:true}).addTo(map);
  hot.bindTooltip(tip,{sticky:true});
  return hot;
}
/* Draw ONE leg. Nothing is drawn for a drive until real road geometry is
   ready — no straight-line placeholders, ever. Flights draw immediately as a
   thin dotted arc. Returns a promise with the leg's distance/time so callers
   can build routed trip totals ({est:true} when the engine was unreachable). */
function drawLeg(map,gen,a,b,style,meta){
  meta=meta||{};
  if(sameSpot(a,b)) return Promise.resolve({km:0,min:0});   /* same place: nothing to draw */
  if(meta.fly){
    var arc=flightArc([a.lat,a.lon],[b.lat,b.lon]);
    var gk=(hav([a.lat,a.lon],[b.lat,b.lon])||0)*1.60934;
    var fmin=gk/750*60+30;
    L.polyline(arc,{color:(style&&style.color)||'#2563eb',weight:1.5,dashArray:'1 6',opacity:.85,interactive:false}).addTo(map);
    legHover(map,arc,legTip(meta,gk,fmin));
    return Promise.resolve({fly:true,km:0,min:0});
  }
  var estMi=roadMi([a.lat,a.lon],[b.lat,b.lon])||0;
  return roadRoute([a.lat,a.lon],[b.lat,b.lon]).then(function(rt){
    if(!rt) return {km:estMi*1.60934,min:estMi/55*60,est:true};
    if(map._aqGen===gen){
      try{
        var st={color:style&&style.color||'#2563eb',weight:2,opacity:(style&&style.opacity)||.9,interactive:false};
        L.polyline(rt.pts,st).addTo(map);
        legHover(map,rt.pts,legTip(meta,rt.km,rt.min));
      }catch(e){}
    }
    return {km:rt.km,min:rt.min};
  });
}
/* When the routing engine is unreachable some legs stay undrawn (never a
   misleading straight line). Show a quiet notice on the map with a Retry
   that clears the dead-router memory and redraws. */
function routeStatusCtl(map,gen,rs,redraw){
  if(!map||map._aqGen!==gen) return;
  var n=0; (rs||[]).forEach(function(r){ if(r&&r.est) n++; });
  if(!n) return;
  var div=L.DomUtil.create('div','aq-rtfail');
  div.innerHTML=n+' route'+(n>1?'s':'')+' unavailable <button>Retry</button>';
  var ctl=L.control({position:'bottomleft'});
  ctl.onAdd=function(){ return div; };
  ctl.addTo(map);
  div.querySelector('button').onclick=function(ev){
    ev.stopPropagation();
    _rtDead={};                       /* forget dead routers and try again */
    try{ redraw&&redraw(); }catch(e){}
  };
}
function drawTripMap(stops){
  var el=document.getElementById('tripMap'); if(!el||typeof L==='undefined')return;
  if(_tripMap){ try{_tripMap.remove();}catch(e){} _tripMap=null; }
  _tripMap=L.map(el,{zoomControl:true,scrollWheelZoom:true}).setView([43.5,-79],5);
  var gen=++_aqMapGen; _tripMap._aqGen=gen;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OpenStreetMap'}).addTo(_tripMap);
  var pts=stops.filter(function(s){return s.lat!=null&&s.lon!=null&&isFinite(s.lat)&&isFinite(s.lon);});
  pts.forEach(function(s){ L.marker([s.lat,s.lon],{icon:pinIcon(s)}).addTo(_tripMap).bindTooltip(stopTip(s)).bindPopup(popupHTML(s)); });
  var legs=[];
  for(var i=1;i<pts.length;i++){
    var a=pts[i-1], b=pts[i];
    var both=(a.status==='Confirmed'&&b.status==='Confirmed');
    var fly=(normType(a.type)==='airport'&&normType(b.type)==='airport');
    legs.push(drawLeg(_tripMap,gen,a,b,
      both?{color:'#16a34a',weight:2.5}:{color:'#2563eb',weight:2,dashArray:'6 6'},
      {from:a.name,to:b.name,area:terr,rep:FLAT.tm[terr]||'',fly:fly,day:b.dayLabel,time:b.time}));
  }
  /* routed trip totals for the Overview card (falls back to the estimate) */
  Promise.all(legs).then(function(rs){
    if(!_tripMap||_tripMap._aqGen!==gen) return;
    var km=0,min=0; rs.forEach(function(r){ if(r&&!r.fly){ km+=r.km; min+=r.min; } });
    var ek=document.getElementById('rtTotKm'), eh=document.getElementById('rtTotHrs');
    if(ek) ek.textContent=Math.round(km).toLocaleString()+' km';
    if(eh) eh.textContent=hrsLabel(min/60);
    routeStatusCtl(_tripMap,gen,rs,function(){ drawTripMap(stops); });
  });
  if(pts.length) _tripMap.fitBounds(L.latLngBounds(pts.map(function(s){return [s.lat,s.lon];})).pad(0.25));
  setTimeout(function(){ if(_tripMap)_tripMap.invalidateSize(); },60);
}

let _lvMap=null;
function lvDrawMap(){
  var el=document.getElementById('leaderMap'); if(!el||typeof L==='undefined')return;
  if(_lvMap){ try{_lvMap.remove();}catch(e){} _lvMap=null; }
  _lvMap=L.map(el,{zoomControl:true,scrollWheelZoom:true}).setView([45,-98],4);
  var gen=++_aqMapGen; _lvMap._aqGen=gen;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OpenStreetMap'}).addTo(_lvMap);
  var bounds=[], legs=[];
  TERRS.forEach(function(t){
    if(!LV_AREAS[t]) return;
    var rep=FLAT.tm[t]||'';
    if(LV_REP && rep!==LV_REP) return;
    var col=AREA_COLOR[t];
    var stops=stopsForWeek(t,LV_WEEK).filter(function(s){ return s.lat!=null&&s.lon!=null&&isFinite(s.lat)&&isFinite(s.lon); });
    stops.forEach(function(s){
      var st=STOP_TYPES[normType(s.type)];
      var isDealer=(s.kind==='dealer'||s.kind==='xvisit');
      L.marker([s.lat,s.lon],{icon:mkPin(isDealer?col:st.color,st.glyph)}).addTo(_lvMap)
        .bindTooltip(stopTip(s)+'<br>'+esc([rep,t].filter(Boolean).join(' · '))).bindPopup(popupHTML(s));
      bounds.push([s.lat,s.lon]);
    });
    for(var i=1;i<stops.length;i++){
      var a=stops[i-1], b=stops[i];
      var fly=(normType(a.type)==='airport'&&normType(b.type)==='airport');
      legs.push(drawLeg(_lvMap,gen,a,b,{color:col,weight:2.5,opacity:.8},
        {from:a.name,to:b.name,area:t,rep:rep,fly:fly,day:b.dayLabel,time:b.time}));
    }
  });
  Promise.all(legs).then(function(rs){
    if(!_lvMap||_lvMap._aqGen!==gen) return;
    var km=0,min=0; rs.forEach(function(r){ if(r&&!r.fly){ km+=r.km; min+=r.min; } });
    var ek=document.getElementById('lvTotKm'), eh=document.getElementById('lvTotHrs');
    if(ek) ek.textContent=Math.round(km).toLocaleString()+' km';
    if(eh) eh.textContent=hrsLabel(min/60);
    routeStatusCtl(_lvMap,gen,rs,lvDrawMap);
  });
  if(bounds.length) _lvMap.fitBounds(L.latLngBounds(bounds).pad(0.2));
  setTimeout(function(){ if(_lvMap)_lvMap.invalidateSize(); },60);
}

/* ---------- editing ---------- */
function setStopField(key,field,val){
  var kind=key.slice(0,1), id=key.slice(2);
  /* No cost fields on stops: spend lives in EXPENSES, not on a visit. */
  if(kind==='d'){
    var x=STOPX[id]=STOPX[id]||{};
    if(field==='time') TIME[id]=val;                            /* shared with Schedule */
    else if(field==='type') return;                             /* a dealer visit stays a dealer visit */
    else if(field==='name') return;                             /* dealer names belong to the Master Sheet */
    else x[field]=val;                                          /* notes, conf */
  } else {
    var it=LOGI.filter(function(l){return l.id===id;})[0]; if(!it) return;
    if(field==='type') it.type=normType(val);
    else it[field]=val;
  }
  savePlan();
  renderTerrMap();
}
function addManualStop(o){
  LOGI.push({id:'L'+Date.now()+Math.floor(Math.random()*1000), terr:(terr==='All'?'East':terr), wk:terrMapWeek,
    type:normType(o.type), name:o.name, label:o.name, address:o.address, city:o.city, state:o.state, county:o.county,
    lat:(o.lat!==''&&o.lat!=null)?Number(o.lat):null, lon:(o.lon!==''&&o.lon!=null)?Number(o.lon):null,
    day:(o.day===''?null:parseInt(o.day,10)), time:o.time,
    notes:o.notes, conf:o.conf, status:o.status||'Pending'});
  savePlan(); renderTerrMap();
}

/* ---------- itinerary card: the actual trip, day by day, with legs ---------- */
function itinIcon(i){
  if(i.kind==='dealer'||i.kind==='xvisit') return '<span class="iic" style="background:'+STOP_TYPES.dealer.color+'"></span>';
  var T=TRAVEL_TYPES[i.type]||TRAVEL_TYPES.other;
  return '<span class="iic" style="background:'+T.color+'">'+T.icon+'</span>';
}
function itinName(i){
  if(i.kind==='dealer'||i.kind==='xvisit') return esc(i.name);
  var T=TRAVEL_TYPES[i.type]||TRAVEL_TYPES.other;
  /* itineraryFor() falls back to the type label when a place is unnamed — don't repeat it */
  if(!i.name || i.name===T.label) return esc(T.label);
  return esc(T.label)+' — '+esc(i.name);
}
function itineraryCard(t,wk){
  var items=itineraryFor(t,wk);
  var R=legsFor(items);
  var labs=dayLabels(wk);
  /* index legs by the item they arrive at, so a leg renders under its destination */
  var legTo={}; R.legs.forEach(function(l){ legTo[l.to.kind+':'+l.to.id]=l; });

  var byDay={}, undated=[];
  items.forEach(function(i){ if(i.day==null) undated.push(i); else (byDay[i.day]=byDay[i.day]||[]).push(i); });

  var body='';
  Object.keys(byDay).sort(function(a,b){return a-b;}).forEach(function(d){
    var lab=labs[d]?(labs[d][0]+' · '+labs[d][1]):('Day '+d);
    body+='<div class="idayhd">'+esc(lab)+'</div>';
    byDay[d].forEach(function(i){
      var leg=legTo[i.kind+':'+i.id];
      if(leg) body+='<div class="ileg">↓ '+legLabel(leg)+'</div>';
      body+='<div class="irow">'+itinIcon(i)
        +'<span class="itime">'+(i.time?t12s(i.time):'—')+'</span>'
        +'<span class="iname">'+itinName(i)+'</span>'
        +(i.located?'':'<span class="ibad">Needs address</span>')
        +'</div>';
    });
  });
  if(undated.length){
    body+='<div class="idayhd">Needs a day</div>';
    undated.forEach(function(i){
      body+='<div class="irow">'+itinIcon(i)+'<span class="itime">—</span>'
        +'<span class="iname">'+itinName(i)+'</span>'
        +(i.located?'':'<span class="ibad">Needs address</span>')+'</div>';
    });
  }
  if(!items.length) body='<div style="color:var(--muted-2);padding:10px 0">Nothing scheduled this week.</div>';

  var warn=R.unlocated?('<div class="legrow warn">'+R.unlocated+' item'+(R.unlocated===1?'':'s')+' excluded from routing — needs an address</div>'):'';

  return '<div class="tcard"><div class="tch"><div class="tct">Itinerary</div>'
    +'<span style="font-size:11px;color:var(--muted)">'+Math.round(R.totalKm).toLocaleString()+' km · '+hrsLabel(R.totalHours)+'</span></div>'
    +'<div class="tcb"><div class="itin">'+body+'</div>'+warn
    +'<div class="geo-attr">Geocoding &copy; <a href="https://openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors</div>'
    +'</div></div>';
}
/* plain-text name of an itinerary item (no label duplication) */
function legName(i){
  if(i.kind==='dealer'||i.kind==='xvisit') return i.name;
  var T=TRAVEL_TYPES[i.type]||TRAVEL_TYPES.other;
  return (!i.name||i.name===T.label)?T.label:(T.label+' — '+i.name);
}
/* dealer-visit report section: name, date/time, attendees, notes, actions, follow-ups, status.

/* route summary rows for the trip report */
function routeSummaryRows(t,wk){
  var items=itineraryFor(t,wk), R=legsFor(items), labs=dayLabels(wk);
  return R.legs.map(function(l,i){
    return {'#':i+1,
      From:legName(l.from),

      'Distance (km)':Math.round(l.km),
      'Type':(l.fly?'Flight':'Drive'),

/* Stops carry no money. Expenses are reported separately, with variance. */

    return {'#':i+1, Territory:t, Week:wk, Dates:WEEKDATES[wk], Stop:s.name, Type:STOP_TYPES[normType(s.type)].label,
      Date:s.dayLabel, Time:s.time?t12s(s.time):'', Address:s.address, City:s.city, 'State/Prov':s.state,

function expenseReportRows(t,wk,exps){

    return {'#':i+1, Territory:e.terr, Week:e.wk, Category:normCat(e.cat), Vendor:e.vendor||'',

      Type:(e.isEst?'Estimate':'Actual'), Amount:num(e.amount).toFixed(2), Notes:e.notes||'',

function tripDownloadCSV(t,wk,stops,rm,bud,exps){
  var q=function(v){ v=(v==null?'':String(v)); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  var lines=[];

  var srows=tripReportRows(t,wk,stops);
  var scols=srows.length?Object.keys(srows[0]):['#'];
  lines.push('STOPS');
  lines.push(scols.join(','));
  srows.forEach(function(r){ lines.push(scols.map(function(c){return q(r[c]);}).join(',')); });

  lines.push('','ROUTE');
  var rrows=routeSummaryRows(t,wk);
  var rcols=['#','From','To','Day','Distance (km)','Drive time'];
  lines.push(rcols.join(','));
  if(rrows.length) rrows.forEach(function(r){ lines.push(rcols.map(function(c){return q(r[c]);}).join(',')); });
  else lines.push('(no located legs)');

  lines.push('','EXPENSES');
  var erows=expenseReportRows(t,wk,exps);
  var ecols=['#','Territory','Week','Category','Vendor','Date','Type','Amount','Notes','Receipt'];
  lines.push(ecols.join(','));
  erows.forEach(function(r){ lines.push(ecols.map(function(c){return q(r[c]);}).join(',')); });

  lines.push('','BUDGET','Category,Estimated,Actual,Variance,Receipts');
  BUDGET_CATS.forEach(function(c){var r=bud.rows[c];
    lines.push([q(c),r.est.toFixed(2),r.act.toFixed(2),(r.act-r.est).toFixed(2),''].join(','));});
  lines.push(['TOTAL',bud.total.est.toFixed(2),bud.total.act.toFixed(2),(bud.total.act-bud.total.est).toFixed(2),''].join(','));

  var kmKey=t+'|'+wk, actualKm=num(ACTKM[kmKey]), plannedKm=Math.round(rm.km);
  var visits=stops.filter(function(s){return s.kind==='dealer';}).length;
  var kmForCost=actualKm||plannedKm;
  lines.push('','MILEAGE');
  lines.push('Total drive time,'+hrsLabel(rm.hours));
  lines.push('Planned km,'+plannedKm);
  lines.push('Actual km,'+(actualKm||''));
  lines.push('Cost per km,'+(kmForCost?(bud.total.act/kmForCost).toFixed(2):''));
  lines.push('Cost per dealer visit,'+(visits?(bud.total.act/visits).toFixed(2):''));
  lines.push('','Receipts,Requires secure login');

  var blob=new Blob([lines.join('\n')],{type:'text/csv'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='trip-'+String(t).toLowerCase()+'-week'+wk+'.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
}
function tripDownloadPDF(t,wk,stops,rm,bud,exps){
  var srows=tripReportRows(t,wk,stops);
  var scols=srows.length?Object.keys(srows[0]):[];
  var shead='<tr>'+scols.map(function(c){return '<th>'+esc(c)+'</th>';}).join('')+'</tr>';

                        : '<tr><td colspan="7">No expenses recorded.</td></tr>';

  var visits=stops.filter(function(s){return s.kind==='dealer';}).length;
  var kmForCost=actualKm||plannedKm;

  var html='<div class="phead"><div class="brand">ARROWQUIP</div><div class="ptitle">'+esc(String(t))+' — Week '+wk+' ('+esc(WEEKDATES[wk])+')</div></div>'
    +'<p>Drive time '+hrsLabel(rm.hours)+' · Planned '+plannedKm+' km'+(actualKm?(' · Actual '+actualKm+' km'):'')
      +(kmForCost?(' · '+money(bud.total.act/kmForCost)+'/km'):'')
      +(visits?(' · '+money(bud.total.act/visits)+'/dealer visit'):'')+'</p>'
    +'<h3>Stops</h3><table class="sched">'+shead+sbody+'</table>'
    +(function(){
        var rr=routeSummaryRows(t,wk);
        if(!rr.length) return '<h3>Route</h3><p>No located legs — add addresses to travel items.</p>';
        var rc=['#','From','To','Day','Distance (km)','Drive time'];
        return '<h3>Route</h3><table class="sched"><tr>'+rc.map(function(c){return '<th>'+esc(c)+'</th>';}).join('')+'</tr>'
          +rr.map(function(r){return '<tr>'+rc.map(function(c){return '<td>'+esc(String(r[c]))+'</td>';}).join('')+'</tr>';}).join('')
          +'</table>';
      })()
    +dealerVisitReportHTML(t,wk)
    +'<h3>Expenses</h3><table class="sched">'+ehead+ebody+'</table>'
    +'<h3>Budget</h3><table class="sched"><tr><th>Category</th><th>Estimated</th><th>Actual</th><th>Variance</th><th>Receipts</th></tr>'
    +budRows+'<tr><th>TOTAL</th><th>'+money(bud.total.est)+'</th><th>'+money(bud.total.act)+'</th><th>'+money(bud.total.act-bud.total.est)+'</th><th>—</th></tr></table>'
    +'<p style="color:#666">Receipts require secure login; none are stored for this trip.</p>';
  tpOpen(String(t)+' Week '+wk+' Trip Report', html);
}

function selOpts(list,cur){return list.map(o=>`<option ${o===cur?'selected':''}>${o}</option>`).join("");}
/* Phase A: Salesforce is the master dealer list (Master Sheet render only).
   Build the universe from the full Salesforce set (keyed by Account Id) and overlay existing
   planner data where it exists; planner dealers with no Salesforce match remain as local-only
   rows. DEALERS / dealersIn / scheduling / saved data shape are NOT touched — this only changes
   what renderMaster iterates. Falls back to the current planner list when Salesforce isn't loaded. */
function newSFRow(sf){
  var o={ id:sf.id, _accountId:sf.id, _newSF:true, _sf:true, _sfId:sf.id,
    name:sf.name||'', territory:sf.territory||'', tm:sf.tm||'', tier:sf.tier||'New',
    loc:sf.loc||'', address:sf.address||'',
    lastYear:(sf.lastYear!=null?sf.lastYear:0), lat:(sf.lat!=null?sf.lat:null), lon:(sf.lon!=null?sf.lon:null),
    booking:0, loads:(sf.loads!=null?+sf.loads:0), visitConfirmed:false, atKickoff:false, remote:false,
    commit2026:0, prebook2026:0, areaPlanning:true, status:'Not Started' };
  o._sources={ name:sf.name?'salesforce':'planner-fallback', territory:sf.territory?'salesforce':'planner-fallback',
    tm:sf.tm?'salesforce':'planner-fallback', tier:sf.tier?'salesforce':'planner-fallback',
    loc:sf.loc?'salesforce':'planner-fallback', address:sf.address?'salesforce':'planner-fallback',
    lastYear:(sf.lastYear!=null?'salesforce':'planner-fallback'), lat:(sf.lat!=null?'salesforce':'planner-fallback'),
    lon:(sf.lon!=null?'salesforce':'planner-fallback'), booking:'planner-fallback',
    loads:(sf.loads!=null?'salesforce':'planner-fallback'),
    commit2026:'planner-fallback', prebook2026:'planner-fallback',
    visitConfirmed:'local', atKickoff:'local' };
  return o;
}
function buildMasterUniverse(){
  var ids=SF_BY_ID?Object.keys(SF_BY_ID):[];
  if(!ids.length) return DEALERS.map(sfMasterMerge); /* Salesforce not loaded → current planner view */
  var plannerBySf={};
  DEALERS.forEach(function(d){ var sf=sfLookup(d); if(sf && !plannerBySf[sf.id]) plannerBySf[sf.id]=d; });
  var rows=[];
  ids.forEach(function(sid){

    var pr=raw.slice(3).split('|');

    xv.day=(pp[1]!=null&&pp[1]!=='none')?parseInt(pp[1],10):null;
    savePlan(); refreshPlanner(); return;
  }

  const d=uniById(id); if(!d)return;

  else if(t==='remote'){ASSIGN[id]='remote';DAY[id]=null;}
  else { var parts=t.split('|'); var nw=parseInt(parts[0],10); var prev=ASSIGN[id]; ASSIGN[id]=nw; if(parts[1]!=null&&parts[1]!=='none'){DAY[id]=parseInt(parts[1],10);} else if(prev!==nw){DAY[id]=null;} }

/* ---------- unified drag engine (Pointer Events) ----------
   One code path for mouse, trackpad, pen and touch (incl. Windows touch),
   replacing the old HTML5 drag events that silently failed on touch screens
   and in some browser/session states. Document-level delegation means cards
   never need per-render listeners — re-renders can't break dragging.
   Mouse/pen: drag starts after 4px of movement. Touch: a 300ms hold starts
   the drag, so normal scrolling still works. */
var DND={src:null,raw:null,ghost:null,zone:null,active:false,touch:false,sx:0,sy:0,gdx:0,gdy:0,hold:null};
function dndZoneAt(x,y){
  var el=document.elementFromPoint(x,y);

function dndStart(x,y){
  if(DND.active||!DND.src) return;
  DND.active=true;
  var g;
  if(DND.raw&&DND.raw.slice(0,3)==='mk:'){
    /* creating from the library: the ghost is a mini card — dealer name + type */
    var pr=DND.raw.slice(3).split('|');
    var d=uniById(pr[0]);
    var B=VBADGE[pr[1]==='visit'?'visit':'prebook'];
    g=document.createElement('div');
    g.className='kcard vc dndghost mkghost';
    g.innerHTML='<div class="kc-top"><span class="vbadge '+B.cls+'">'+B.icon+B.label+'</span>'
      +'<div class="kc-name">'+esc(d?d.name:'')+'</div></div>';
    g.style.borderLeftColor=(pr[1]==='visit'?'#16a34a':'#3a7bd5');
    DND.gdx=18; DND.gdy=14;
  } else {
    var r=DND.src.getBoundingClientRect();
    DND.gdx=Math.min(x-r.left,r.width-8); DND.gdy=Math.min(y-r.top,r.height-8);
    g=DND.src.cloneNode(true);

function dndAutoScroll(x,y){

    if(Math.abs(x-DND.sx)<4&&Math.abs(y-DND.sy)<4) return;
    dndStart(x,y);

function dndInit(){
  if(dndInit.done) return; dndInit.done=true;

    if(!card||!card.dataset.id) return;

    var ctl=e.target.closest('select,input,button,textarea,a,label,.ldpick');

/* ============ Data integrity layer ==========================================
   Writes go exclusively through the pb_save_state RPC, which enforces optimistic
   concurrency server-side (anon no longer holds UPDATE/INSERT on prebooking_state).
   A tab that has fallen behind is rejected rather than silently overwriting newer
   work — the failure mode that destroyed the 2027 plan. */
var PB_VER={};              /* row id -> version this tab loaded / last wrote */
/* verification mode: ?readonly=1 blocks every write path. Initialised here, at the

      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg',0.8));
    };
    img.onerror=function(){ URL.revokeObjectURL(url); res(null); };
    img.src=url;
  }catch(e){ res(null); } });
}
function pbReceiptOcr(file,docId){
  if(!/^image\//.test(file.type||'')){ pbDocStatus(docId,{ocr_status:'needs_review'}); return; }
  pbShrinkImage(file,1200).then(function(dataUrl){
    if(!dataUrl){ pbDocStatus(docId,{ocr_status:'needs_review'}); return; }
    cloudBadge('Reading receipt…');
    return fetch('/api/receipt-ocr?k=aq-d3-4e8a1f60d9b2',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:dataUrl.split(',')[1], mime:'image/jpeg'})
    }).then(function(r){ return r.json(); }).then(function(j){
      if(!j||!j.ok){
        pbDocStatus(docId,{ocr_status:'needs_review'});
        cloudBadge((j&&j.reason==='not_configured')?'Receipt saved — AI reading needs setup':'Receipt saved — needs review');
        return;
      }
      var conf=+j.confidence||0;
      pbDocStatus(docId,{ocr_status:(conf>=0.6?'read':'needs_review'), ocr_fields:j, suggested_category:normCat(j.category||'Other')});
      cloudBadge(conf>=0.6?'Receipt read — review the draft':'Receipt read — low confidence, review');
      if(typeof mobIsPhone==='function'&&mobIsPhone()&&typeof mobExpenseSheet==='function'){
        mobExpenseSheet({cat:normCat(j.category||'Other'), vendor:j.vendor||'', amount:(j.total!=null?j.total:''),
          notes:'From receipt'+(j.date?(' · '+j.date):''), docId:docId});
      }
    });
  }).catch(function(){ pbDocStatus(docId,{ocr_status:'needs_review'}); });
}
/* Capture general documents -> trip-documents bucket + document rows. */
function pbCaptureDocuments(meta, done){
  if(!pbAuthed()){ alert('Sign in to upload documents.'); return; }

  });
}

    +'</div>';
  document.body.appendChild(m);

/* routed totals for the drive footer: real road km/time when the router answers */
function mobUpdateDriveTotals(){
  var el=document.getElementById('tmDriveTot'); if(!el) return;
  var pts=mobRouteScope().filter(function(i){return i.located;});
  if(pts.length<2) return;
  var jobs=[];
  for(var i=1;i<pts.length;i++){
    (function(a,b){
      var fly=(String(a.type).indexOf('flight')===0&&String(b.type).indexOf('flight')===0);
      if(fly){ jobs.push(Promise.resolve({km:0,min:0})); return; }
      var estMi=roadMi([a.lat,a.lon],[b.lat,b.lon])||0;
      jobs.push(roadRoute([a.lat,a.lon],[b.lat,b.lon]).then(function(rt){
        return rt?{km:rt.km,min:rt.min}:{km:estMi*1.60934,min:estMi/55*60};
      }));
    })(pts[i-1],pts[i]);
  }
  Promise.all(jobs).then(function(rs){
    var el2=document.getElementById('tmDriveTot'); if(!el2) return;
    var km=0,min=0; rs.forEach(function(r){ km+=r.km; min+=r.min; });
    el2.textContent=hrsLabel(min/60)+' · '+Math.round(km).toLocaleString()+' km';
  });
}

  MOB.map=L.map(el,{zoomControl:true,scrollWheelZoom:true,attributionControl:true}).setView([43.5,-79],5);
  var gen=++_aqMapGen; MOB.map._aqGen=gen;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OpenStreetMap'}).addTo(MOB.map);
  pts.forEach(function(i){
    var ic=mobIcon(i);
    L.marker([i.lat,i.lon],{icon:L.divIcon({className:'',html:'<div class="pin" style="background:'+ic.c+';width:20px;height:20px;font-size:10px">'+ic.g+'</div>',iconSize:[20,20],iconAnchor:[10,10]})})
      .addTo(MOB.map).bindPopup('<b>'+esc(i.name||mobKind(i))+'</b><br>'+esc(mobKind(i)));
  });
  /* one routed leg per consecutive pair — each individually tappable */
  var labs=dayLabels(MOB.wk), mlegs=[];
  for(var i=1;i<pts.length;i++){
    var a=pts[i-1], b=pts[i];
    var fly=(String(a.type).indexOf('flight')===0&&String(b.type).indexOf('flight')===0);
    mlegs.push(drawLeg(MOB.map,gen,a,b,{color:'#2563eb',weight:4,opacity:.85},
      {from:a.name||mobKind(a),to:b.name||mobKind(b),area:MOB.terr,rep:FLAT.tm[MOB.terr]||'',fly:fly,
       day:(b.day!=null&&labs[b.day])?(labs[b.day][0]+', '+labs[b.day][1]):'',time:b.time}));
  }
  Promise.all(mlegs).then(function(rs){ routeStatusCtl(MOB.map,gen,rs,mobDrawMap); });
  if(pts.length) MOB.map.fitBounds(L.latLngBounds(pts.map(function(i){return [i.lat,i.lon];})).pad(0.25));
  setTimeout(function(){ if(MOB.map) MOB.map.invalidateSize(); },80);
}

function mobBudget_render(){
  var exps=expensesFor(MOB.terr,MOB.wk);
  var bud=budgetFor(exps);
  var spend=bud.total.act, planned=bud.total.est;
  var remaining=planned-spend;
  var pct=planned?Math.min(100,Math.round(spend/planned*100)):0;
  var over=spend>planned && planned>0;
  var labs=dayLabels(MOB.wk);

  var h='<div class="tm-screen">'
    +'<div class="tm-spend"><div class="row">'
      +'<div><div class="k">Total spend</div><div class="v">'+money(spend)+'</div></div>'
      +'<div style="text-align:right"><div class="k">'+(over?'Over budget':'Remaining')+'</div><div class="v" style="color:'+(over?'#dc2626':'#111')+'">'+money(Math.abs(remaining))+'</div></div>'
    +'</div>'
    +(planned?('<div style="font-size:12px;color:#6b7280;margin-top:4px">of '+money(planned)+' budget</div>'
      +'<div class="tm-bar'+(over?' over':'')+'"><i style="width:'+pct+'%"></i></div>'):'<div style="font-size:12px;color:#9ca3af;margin-top:6px">No estimate entered for this week.</div>')
    +'</div>';

  h+='<div class="tm-h"><span>By category</span></div>';
  h+=BUDGET_CATS.map(function(c){
      var r=bud.rows[c]; if(!r.act && !r.est) return '';
      var p=spend?Math.round(r.act/spend*100):0;
      return '<div class="tm-cat"><span class="cn">'+esc(c)+'</span><span class="cv">'+money(r.act)+'</span><span class="cp">'+p+'%</span></div>';
    }).join('') || '<div class="tm-empty">No expenses yet this week.</div>';

  h+='<div class="tm-h"><span>Recent expenses</span><span class="tm-count">'+exps.length+'</span></div>';
  h+= exps.slice(-6).reverse().map(function(e){
        return '<div class="tmrow"><div class="t"><b>'+esc(e.vendor||normCat(e.cat))+'</b>'
          +'<span>'+esc(normCat(e.cat))+' · '+(e.date!=null&&labs[e.date]?(labs[e.date][0]+', '+labs[e.date][1]):'no date')+(e.isEst?' · estimate':'')+'</span></div>'
          +'<span class="tmc-time">'+money(e.amount)+'</span></div>';
      }).join('') || '<div class="tm-empty">Nothing recorded yet.</div>';

  h+='<button class="tm-primary" id="mobAddExp">+ Add Expense</button>';
  h+= pbAuthed()
      ? '<button class="tm-primary" id="mobCapReceipt" style="margin-top:8px">📷 Capture Receipt</button>'
      : '<button class="tm-primary" style="background:#e5e7eb;color:#9ca3af;margin-top:8px" disabled title="Requires secure login">📷 Capture Receipt — requires secure login</button>';
  h+='</div>';
  return h;
}

/* documents for the current area+week (all areas when Trip Mode shows All) */
function pbListDocs(kind){
  if(!SB||!pbAuthed()) return Promise.resolve([]);
  var q=SB.from('prebooking_documents')
    .select('id,title,storage_path,created_at,week,territory,stop_key,kind,mime_type,ocr_status,ocr_fields,suggested_category,expense_ids')
    .eq('kind',kind).eq('week',MOB.wk).order('created_at',{ascending:false}).limit(60);
  if(MOB.terr!=='All') q=q.eq('territory',MOB.terr);
  return q.then(function(res){ return (res&&res.data)||[]; },function(){ return []; });
}
function pbSignedUrl(storagePath){
  var i=(storagePath||'').indexOf('/'); if(i<0) return Promise.resolve(null);
  return SB.storage.from(storagePath.slice(0,i)).createSignedUrl(storagePath.slice(i+1),3600)
    .then(function(s){ return (s&&s.data&&s.data.signedUrl)||null; }).catch(function(){ return null; });
}
function pbRcptStatus(r){
  if(r.expense_ids&&r.expense_ids.length) return ['Entered into Expenses','#15803d','#e7f3ec'];
  if(r.ocr_status==='read') return ['Read by AI','#1d4ed8','#eff6ff'];
  return ['Needs Review','#b45309','#fef3c7'];
}
function pbDocRowHTML(r,url,opts){

    ? ('<img src="'+url+'" style="width:46px;height:46px;object-fit:cover;border-radius:8px;flex:0 0 auto;background:#f3f4f6" alt="">')

  if(dealer) meta.push(esc(dealer));
  var sub2='';
  if(opts.receipt){
    var st=pbRcptStatus(r);

  return '<div class="tmrow" style="align-items:center">'+img

var _rcptRows={};
function mobFillFiles(){
  if(MOB.tab!=='files'||!pbAuthed()) return;
  function fill(kind,hostId,opts){
    if(!document.getElementById(hostId)) return;
    pbListDocs(kind).then(function(rows){
      var h=document.getElementById(hostId); if(!h) return;
      if(!rows.length){ h.textContent=(opts&&opts.receipt)?'No receipts for this week yet.':(kind==='visit_photo'?'No visit photos this week yet.':'No documents this week yet.'); return; }
      Promise.all(rows.map(function(r){ return pbSignedUrl(r.storage_path).then(function(u){ return pbDocRowHTML(r,u,opts); }); }))
        .then(function(parts){
          var h2=document.getElementById(hostId); if(!h2) return;
          h2.className=''; h2.style.padding='0'; h2.innerHTML=parts.join('');
          rows.forEach(function(r){ _rcptRows[r.id]=r; });
          h2.querySelectorAll('[data-rcptexp]').forEach(function(b){ b.onclick=function(){
            var r=_rcptRows[b.dataset.rcptexp]||{}; var f=r.ocr_fields||{};
            mobExpenseSheet({cat:normCat(r.suggested_category||f.category||'Other'), vendor:f.vendor||'', amount:(f.total!=null?f.total:''),
              notes:'From receipt'+(f.date?(' · '+f.date):''), docId:r.id});
          };});
        });
    });
  }
  fill('document','mobDocList');
  fill('receipt','mobRcptList',{receipt:true});
  fill('visit_photo','mobSfList',{storefront:true});
}
