<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arrowquip · Pre-Booking Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --aq-red: #cf202f;
    --aq-black: #000000;
    --aq-charcoal: #292828;
    --aq-grey-100: #f4f4f4;
    --aq-grey-200: #e5e5e5;
    --aq-grey-300: #d4d4d4;
    --aq-grey-400: #a3a3a3;
    --aq-grey-500: #737373;
    --aq-grey-600: #525252;
    --aq-grey-700: #404040;
    --aq-bg: #fafafa;
    --aq-red-soft: #fdecee;
    --font-display: 'Barlow Condensed', 'Frutiger Next LT Condensed', 'Arial Narrow', sans-serif;
    --font-body: 'Open Sans', 'Helvetica', 'Calibri', 'Arial', sans-serif;
  }
  html, body {
    font-family: var(--font-body);
    background: var(--aq-bg);
    color: var(--aq-black);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, select { font-family: inherit; }
  table { border-collapse: collapse; width: 100%; }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 256px;
    background: #ffffff;
    color: #171717;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .sidebar-header { padding: 24px; border-bottom: 1px solid #e5e5e5; }
  .sidebar-eyebrow {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #737373;
    margin-top: 12px;
  }
  .nav { flex: 1; padding: 12px; }
  .nav button {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    color: #525252;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    text-align: left;
    transition: all 0.15s;
    margin-bottom: 4px;
  }
  .nav button:hover { background: #f4f4f4; color: #000; }
  .nav button.active { background: #000000; color: #ffffff; }
  .nav button.active .chev { color: var(--aq-red); margin-left: auto; }
  .nav svg { flex-shrink: 0; }
  .sidebar-footer { padding: 24px; border-top: 1px solid #e5e5e5; }
  .sidebar-footer .label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #737373;
    margin-bottom: 8px;
  }
  .sidebar-footer .version { font-size: 11px; color: #a3a3a3; }
  .sidebar-deco {
    position: absolute;
    bottom: 0;
    right: 0;
    opacity: 0.04;
    pointer-events: none;
  }

  main { flex: 1; min-width: 0; overflow-x: hidden; }
  .container { max-width: 1600px; margin: 0 auto; padding: 48px 40px; }

  /* MOBILE BAR */
  .mobile-bar {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #ffffff;
    color: #171717;
    border-bottom: 1px solid #e5e5e5;
    z-index: 50;
    padding: 12px 16px;
    align-items: center;
    justify-content: space-between;
  }
  .mobile-bar select {
    background: #f4f4f4;
    color: #171717;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 6px 12px;
    border: 1px solid #d4d4d4;
  }

  @media (max-width: 1023px) {
    .sidebar { display: none; }
    .mobile-bar { display: flex; }
    .container { padding-top: 80px; padding-left: 24px; padding-right: 24px; }
  }

  /* LOGO */
  .logo { display: flex; align-items: center; gap: 12px; }
  .dc-logo { padding: 4px 0 2px; }
  .logo-text {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: black;
  }
  .logo-text.inverted { color: white; }

  /* TYPOGRAPHY */
  h1.section-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 40px;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: black;
    margin-bottom: 8px;
    line-height: 1.05;
  }
  .section-eyebrow {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .section-eyebrow span {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--aq-red);
  }
  .section-desc {
    font-size: 14px;
    color: var(--aq-grey-600);
    max-width: 640px;
  }
  .section-header { margin-bottom: 32px; }

  .top-bar {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 40px;
  }
  @media (min-width: 1024px) {
    .top-bar { flex-direction: row; align-items: flex-end; justify-content: space-between; }
  }

  /* CARD */
  .card {
    background: white;
    border: 1px solid var(--aq-grey-200);
    padding: 20px;
    border-radius: 2px;
  }
  .card.accent { border-left: 4px solid var(--aq-red); }
  .card-hover:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .card-p6 { padding: 24px; }

  /* STAT CARD */
  .stat-card-grid {
    display: grid;
    gap: 10px;
    margin-bottom: 20px;
    grid-template-columns: repeat(1, 1fr);
  }
  @media (min-width: 640px) { .stat-card-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .stat-card-grid { grid-template-columns: repeat(4, 1fr); } }

  .stat-card {
    background: white;
    border: 1px solid var(--aq-grey-200);
    padding: 20px;
    border-radius: 2px;
    transition: box-shadow 0.15s;
  }
  .stat-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .stat-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .stat-card-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--aq-grey-500);
  }
  .stat-card-icon { color: var(--aq-grey-400); }
  .stat-card-value {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 30px;
    letter-spacing: -0.01em;
    line-height: 1.1;
    color: var(--aq-charcoal);
    margin-bottom: 4px;
  }
  .stat-card-value.red { color: var(--aq-red); }
  .stat-card-sublabel {
    font-size: 12px;
    color: var(--aq-grey-500);
    margin-top: 8px;
  }

  /* TOGGLES */
  .toggle-group {
    display: inline-flex;
    border: 1px solid var(--aq-grey-300);
    background: white;
    border-radius: 2px;
    margin-bottom: 32px;
  }
  .toggle-group.year { margin-bottom: 0; }
  .toggle-btn {
    padding: 8px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--aq-grey-700);
    transition: background 0.15s;
  }
  .toggle-btn:hover { background: var(--aq-grey-100); }
  .toggle-btn.active { background: black; color: white; }
  .toggle-btn.active.red { background: var(--aq-red); }

  /* TWO-COL GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 768px) { .grid-2 { grid-template-columns: repeat(2, 1fr); } }
  .grid-3 { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 768px) { .grid-3 { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .grid-3 { grid-template-columns: repeat(3, 1fr); } }
  .grid-4 { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 768px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .grid-4 { grid-template-columns: repeat(4, 1fr); } }

  /* DASHBOARD CHART */
  .perf-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 1024px) { .perf-grid { grid-template-columns: 2fr 1fr; } }
  .perf-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .perf-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 20px;
    line-height: 1.2;
  }
  .perf-legend {
    display: flex;
    gap: 16px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--aq-grey-500);
  }
  .perf-legend span {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-swatch { width: 12px; height: 12px; display: inline-block; }
  .perf-row { margin-bottom: 20px; }
  .perf-row:last-child { margin-bottom: 0; }
  .perf-row-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .perf-area-name {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .perf-tm {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--aq-grey-500);
  }
  .perf-bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .perf-bar-track {
    flex: 1;
    height: 16px;
    background: var(--aq-grey-100);
    position: relative;
  }
  .perf-bar-fill {
    height: 100%;
    transition: width 0.7s ease-out;
  }
  .perf-bar-value {
    font-size: 12px;
    font-family: 'SF Mono', Monaco, monospace;
    width: 80px;
    text-align: right;
  }

  /* DEALER STATUS */
  .status-section {
    margin-bottom: 20px;
  }
  .status-section:last-child { margin-bottom: 0; }
  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .status-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .status-count {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 24px;
  }
  .status-bar {
    height: 4px;
    background: var(--aq-grey-100);
  }
  .status-bar-fill {
    height: 100%;
    transition: width 0.7s;
  }

  /* AREA CARDS */
  .area-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--aq-grey-200);
  }
  .area-card-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 24px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  .area-card-tm {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--aq-grey-500);
    margin-top: 4px;
  }
  .growth-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;
  }
  .growth-up { background: var(--aq-grey-100); color: var(--aq-charcoal); }
  .growth-down { background: var(--aq-red-soft); color: var(--aq-red); }
  .area-card-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .area-card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--aq-grey-500);
  }
  .area-card-value {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 18px;
  }
  .area-card-value.large {
    font-size: 22px;
    font-weight: 900;
    color: var(--aq-red);
  }

  /* CALCULATOR */
  .calc-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  @media (min-width: 1024px) {
    .calc-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .calc-list {
    border-bottom: 1px solid var(--aq-grey-200);
    max-height: 600px;
    overflow-y: auto;
  }
  .calc-list-search {
    padding: 16px;
    border-bottom: 1px solid var(--aq-grey-200);
    background: var(--aq-grey-100);
  }
  .search-input-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-input-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--aq-grey-400);
  }
  .search-input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    font-size: 13px;
    border: 1px solid var(--aq-grey-300);
    background: white;
    border-radius: 2px;
  }
  .search-input:focus { outline: none; border-color: black; }
  .area-select {
    width: 100%;
    padding: 8px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border: 1px solid var(--aq-grey-300);
    background: white;
    border-radius: 2px;
  }
  .dealer-item {
    width: 100%;
    text-align: left;
    padding: 16px;
    border-bottom: 1px solid #f5f5f5;
    transition: background 0.1s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dealer-item:hover { background: var(--aq-grey-100); }
  .dealer-item.selected {
    background: var(--aq-grey-100);
    border-left: 4px solid var(--aq-red);
  }
  .dealer-item-name {
    font-size: 13px;
    font-weight: 600;
    color: black;
  }
  .dealer-item-meta {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--aq-grey-500);
    margin-top: 4px;
  }

  /* INPUTS */
  .input-group { margin-bottom: 20px; }
  .input-label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 600;
    color: var(--aq-grey-500);
    margin-bottom: 8px;
  }
  .input-label.flex { display: flex; justify-content: space-between; align-items: center; }
  .input-label-meta {
    text-transform: none;
    letter-spacing: 0;
    font-size: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 400;
  }
  .input-field {
    width: 100%;
    padding: 10px 12px;
    font-size: 18px;
    border: 1px solid var(--aq-grey-300);
    background: white;
    border-radius: 2px;
  }
  .input-field:focus { outline: none; border-color: black; }
  .input-hint {
    font-size: 11px;
    color: var(--aq-grey-500);
    margin-top: 6px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slider {
    flex: 1;
    accent-color: var(--aq-red);
  }
  .slider-value {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 18px;
    width: 64px;
    text-align: right;
  }
  .reset-link {
    font-size: 11px;
    color: var(--aq-red);
    margin-top: 6px;
    background: none;
    padding: 0;
  }
  .reset-link:hover { text-decoration: underline; }

  /* OUTPUT CARDS */
  .output-stack { display: flex; flex-direction: column; gap: 12px; }
  .hero-output {
    background: black;
    color: white;
    padding: 24px;
    border-left: 4px solid var(--aq-red);
    border-radius: 2px;
  }
  .hero-output-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 600;
    color: var(--aq-grey-400);
    margin-bottom: 8px;
  }
  .hero-output-value {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 48px;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .hero-output-sub {
    font-size: 12px;
    color: var(--aq-grey-400);
  }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-family: 'SF Mono', Monaco, monospace;
    color: var(--aq-grey-600);
    margin-bottom: 8px;
  }
  .breakdown-total {
    border-top: 1px solid var(--aq-grey-200);
    padding-top: 8px;
    color: black;
    font-weight: 600;
  }

  /* TABLE */
  .table-wrap {
    background: white;
    border: 1px solid var(--aq-grey-200);
    overflow: hidden;
    border-radius: 2px;
  }
  .table-scroll { overflow-x: auto; }
  table { font-size: 13px; }
  thead tr {
    background: black;
    color: white;
  }
  th {
    text-align: left;
    padding: 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    white-space: nowrap;
  }
  th.right { text-align: right; }
  td {
    padding: 12px;
    border-bottom: 1px solid var(--aq-grey-100);
    color: var(--aq-grey-600);
  }
  td.right { text-align: right; }
  td.mono { font-family: 'SF Mono', Monaco, monospace; }
  td.black { color: black; font-weight: 600; }
  td.red { color: var(--aq-red); font-weight: 600; }
  tbody tr:hover { background: var(--aq-grey-100); }
  tbody tr.alt { background: #fafafa; }

  /* STATUS BADGE */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .status-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .status-good { background: var(--aq-grey-100); color: var(--aq-charcoal); }
  .status-good .dot { background: var(--aq-charcoal); }
  .status-warn { background: var(--aq-red-soft); color: var(--aq-red); }
  .status-warn .dot { background: var(--aq-red); }
  .status-neutral { background: var(--aq-grey-100); color: var(--aq-grey-600); }
  .status-neutral .dot { background: var(--aq-grey-400); }

  /* TIER CARDS */
  .tier-card-eyebrow {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tier-card-eyebrow span {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 600;
    color: var(--aq-grey-500);
  }
  .tier-name {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 28px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .tier-pct {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 36px;
    margin-top: 16px;
    margin-bottom: 4px;
    color: var(--aq-charcoal);
  }
  .tier-pct.red { color: var(--aq-red); }
  .tier-rate-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--aq-grey-500);
    margin-bottom: 20px;
  }
  .tier-detail {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--aq-grey-600);
    margin-bottom: 8px;
  }
  .tier-detail .val {
    font-family: 'SF Mono', Monaco, monospace;
    color: black;
  }
  .tier-detail.border-top {
    padding-top: 8px;
    border-top: 1px solid var(--aq-grey-200);
  }

  /* TIER BREAKDOWN TABLE */
  .tier-breakdown {
    background: white;
    border: 1px solid var(--aq-grey-200);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .tier-breakdown-header {
    background: black;
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 3px solid var(--aq-red);
    flex-wrap: wrap;
  }
  .tier-breakdown-title {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .tier-breakdown-meta {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: #a3a3a3;
  }
  .tier-table {
    width: 100%;
    border-collapse: collapse;
  }
  .tier-table thead th {
    background: var(--aq-grey-100);
    color: var(--aq-grey-500);
    text-align: left;
    padding: 12px 16px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    border-bottom: 2px solid var(--aq-grey-200);
  }
  .tier-table thead th.right { text-align: right; }
  .tier-table thead th.center { text-align: center; }
  .tier-table tbody td {
    padding: 16px;
    border-bottom: 1px solid #f5f5f5;
    font-size: 14px;
    vertical-align: middle;
  }
  .tier-table tbody td.right { text-align: right; }
  .tier-table tbody td.center { text-align: center; }
  .tier-table tbody tr:hover { background: #fafafa; }
  .tier-table tbody tr:last-child td { border-bottom: none; }
  .tier-table .tier-num {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 22px;
    color: var(--aq-red);
    line-height: 1;
    width: 32px;
    display: inline-block;
    text-align: center;
  }
  .tier-table .tier-loads {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 18px;
    color: black;
    letter-spacing: -0.01em;
  }
  .tier-table .tier-loads-unit {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--aq-grey-500);
    font-weight: 600;
    margin-left: 4px;
  }
  .tier-table .tier-discount {
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 16px;
    font-weight: 700;
    color: black;
  }
  .tier-table .tier-coop {
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--aq-red);
  }
  .tier-table .tier-dealers-count {
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 13px;
    color: var(--aq-grey-600);
  }
  .tier-table .tier-top {
    background: linear-gradient(to right, var(--aq-red-soft) 0%, transparent 60%);
  }
  .tier-table .tier-top .tier-num { color: var(--aq-red); }

  /* FORECAST vs ACTUAL pills + delta */
  .tier-forecast-pill {
    display: inline-block;
    background: var(--aq-grey-100);
    border: 1px solid var(--aq-grey-300);
    padding: 3px 12px;
    border-radius: 2px;
    min-width: 36px;
    text-align: center;
    font-family: 'SF Mono', Monaco, monospace;
    font-weight: 700;
    font-size: 13px;
    color: var(--aq-charcoal);
  }
  .tier-actual-pill {
    display: inline-block;
    background: black;
    color: white;
    padding: 3px 12px;
    border-radius: 2px;
    min-width: 36px;
    text-align: center;
    font-family: 'SF Mono', Monaco, monospace;
    font-weight: 700;
    font-size: 13px;
  }
  .tier-delta {
    display: inline-block;
    margin-left: 6px;
    font-family: 'SF Mono', Monaco, monospace;
    font-weight: 700;
    font-size: 11px;
  }
  .tier-delta.up { color: #027a48; }
  .tier-delta.down { color: var(--aq-red); }

  /* Dealers-per-tier — forecast/actual split card */
  .dpt-legend {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    margin-top: -4px;
  }
  .dpt-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--aq-grey-600);
  }
  .sw-forecast,
  .sw-actual {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }
  .sw-forecast {
    background: var(--aq-grey-100);
    border: 1px solid var(--aq-grey-400);
  }
  .sw-actual {
    background: black;
  }
  .dpt-card {
    padding: 16px !important;
  }
  .dpt-section-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .dpt-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    color: var(--aq-grey-600);
    flex: 1;
  }
  .dpt-section-count {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 14px;
    color: black;
  }
  .dpt-row {
    font-size: 11px;
    color: var(--aq-grey-700);
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    padding: 2px 0;
  }
  .dpt-loads {
    font-family: 'SF Mono', Monaco, monospace;
    color: var(--aq-grey-500);
    font-weight: 600;
  }
  .dpt-empty {
    font-size: 10px;
    color: var(--aq-grey-400);
    font-style: italic;
    padding: 4px 0;
  }

  /* PROGRAM DETAILS SECTION */
  .program-details {
    margin-top: 32px;
  }
  .program-details-heading {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 3px solid var(--aq-red);
  }
  .program-details-heading h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 28px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: black;
  }
  .program-details-heading .ribbon {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 700;
    color: var(--aq-red);
  }
  .pd-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  @media (min-width: 768px) {
    .pd-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .pd-card {
    background: white;
    border: 1px solid var(--aq-grey-200);
    border-radius: 2px;
    padding: 24px 24px 20px;
    position: relative;
  }
  .pd-card.full { grid-column: 1 / -1; }
  .pd-card-eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .pd-card-eyebrow .icon-box {
    width: 28px;
    height: 28px;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--aq-red);
    flex-shrink: 0;
  }
  .pd-card-eyebrow .icon-box svg { width: 14px; height: 14px; }
  .pd-card-eyebrow span {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 700;
    color: var(--aq-grey-500);
  }
  .pd-card h3 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 20px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: black;
    margin-bottom: 12px;
    line-height: 1.1;
  }
  .pd-card ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .pd-card li {
    font-size: 13px;
    color: var(--aq-grey-700);
    padding: 8px 0 8px 20px;
    position: relative;
    border-bottom: 1px solid #f5f5f5;
    line-height: 1.5;
  }
  .pd-card li:last-child { border-bottom: none; }
  .pd-card li:before {
    content: '';
    position: absolute;
    left: 0;
    top: 16px;
    width: 8px;
    height: 8px;
    background: var(--aq-red);
    clip-path: polygon(0 0, 100% 50%, 0 100%);
  }
  .pd-card li strong {
    color: black;
    font-weight: 700;
  }
  .pd-card p {
    font-size: 13px;
    color: var(--aq-grey-700);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .pd-card p:last-child { margin-bottom: 0; }
  .pd-callout {
    margin-top: 12px;
    padding: 12px 16px;
    background: var(--aq-grey-100);
    border-left: 3px solid var(--aq-red);
    font-size: 12px;
    color: var(--aq-grey-700);
    line-height: 1.5;
  }
  .pd-callout strong { color: black; }

  /* Changes vs prior year — diff display */
  .pd-changes-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }
  .pd-change-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 16px;
    padding: 12px 0;
    align-items: center;
    border-bottom: 1px solid #f5f5f5;
    font-size: 13px;
  }
  .pd-change-row:last-child { border-bottom: none; }
  .pd-change-label {
    font-family: var(--font-display);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 12px;
    color: black;
  }
  .pd-change-before,
  .pd-change-after {
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 13px;
    text-align: right;
    min-width: 60px;
  }
  .pd-change-before { color: var(--aq-grey-500); text-decoration: line-through; }
  .pd-change-after { color: var(--aq-red); font-weight: 700; }
  .pd-change-arrow {
    color: var(--aq-grey-300);
    font-size: 14px;
  }

  /* ALERTS */
  .alert {
    padding: 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border-radius: 2px;
    border-left: 4px solid var(--aq-red);
  }
  .alert.red-bg { background: var(--aq-red-soft); }
  .alert.grey-bg { background: var(--aq-grey-100); }
  .alert svg { flex-shrink: 0; margin-top: 2px; }
  .alert-text {
    font-size: 13px;
    color: var(--aq-grey-700);
  }

  /* SETTINGS CARDS */
  .settings-card {
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .settings-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .settings-card-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .settings-card-desc {
    font-size: 13px;
    color: var(--aq-grey-600);
    margin-bottom: 16px;
  }
  .settings-card-stat {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--aq-grey-100);
  }
  .settings-card-stat .num {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 24px;
    color: var(--aq-red);
  }
  .settings-card-stat .unit {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--aq-grey-500);
  }
  .settings-card .chev {
    color: var(--aq-grey-400);
    transition: all 0.15s;
  }
  .settings-card:hover .chev {
    color: var(--aq-red);
    transform: translateX(2px);
  }

  /* FOOTER */
  .footer {
    padding: 32px 40px;
    border-top: 1px solid var(--aq-grey-200);
    margin-top: 48px;
    max-width: 1600px;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    justify-content: space-between;
    align-items: flex-start;
  }
  @media (min-width: 640px) {
    .footer { flex-direction: row; align-items: center; }
  }
  .footer-left, .footer-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--aq-grey-500);
  }
  .footer-right { letter-spacing: 0.18em; color: var(--aq-grey-400); }

  /* H2 */
  h2.subsection {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 24px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .mt-10 { margin-top: 40px; }
  .mb-4 { margin-bottom: 16px; }
  .mb-6 { margin-bottom: 24px; }
  .mb-8 { margin-bottom: 32px; }
  .hidden { display: none !important; }

  /* Locked indicator */
  .locked-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    color: var(--aq-grey-600);
  }

  /* AVG DEAL SIZE CALCULATOR PAGE */
  .ads-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .ads-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 32px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    line-height: 1.05;
    margin-bottom: 8px;
  }
  .ads-subtitle {
    font-size: 13px;
    color: var(--aq-grey-600);
    max-width: 720px;
    line-height: 1.5;
  }
  .ads-meta {
    text-align: right;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--aq-grey-500);
    line-height: 1.8;
  }
  .ads-meta strong { color: black; display: block; font-size: 11px; }

  /* Region tab bar (black with red active) */
  .region-tabs {
    background: black;
    display: flex;
    margin-bottom: 16px;
    border-radius: 2px;
    overflow: hidden;
    overflow-x: auto;
  }
  .region-tab {
    flex: 1;
    min-width: 120px;
    padding: 18px 16px;
    color: white;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    border-right: 1px solid #1a1a1a;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .region-tab:last-child { border-right: none; }
  .region-tab:hover { background: #171717; }
  .region-tab.active { background: var(--aq-red); }
  .region-tab .count {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    color: #a3a3a3;
    background: transparent;
    padding: 2px 0;
  }
  .region-tab.active .count { color: rgba(255,255,255,0.7); }

  /* KPI row */
  .kpi-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  @media (min-width: 640px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .kpi-row { grid-template-columns: repeat(4, 1fr); } }
  .kpi-card {
    background: white;
    border: 1px solid var(--aq-grey-200);
    border-top: 3px solid var(--aq-red);
    padding: 18px 20px;
    border-radius: 2px;
  }
  .kpi-card-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--aq-grey-500);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .kpi-card-value {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .kpi-card-sub {
    font-size: 11px;
    color: var(--aq-grey-500);
  }
  .kpi-card-sub strong { color: black; font-weight: 600; }

  /* View controls bar */
  .view-controls {
    background: white;
    border: 1px solid var(--aq-grey-200);
    padding: 16px 20px;
    border-radius: 2px;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    align-items: center;
  }
  .vc-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .vc-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--aq-grey-500);
    font-weight: 600;
  }
  .vc-segmented {
    display: inline-flex;
    border: 1px solid var(--aq-grey-300);
    border-radius: 2px;
  }
  .vc-seg-btn {
    padding: 7px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--aq-grey-700);
  }
  .vc-seg-btn:hover { background: var(--aq-grey-100); }
  .vc-seg-btn.active { background: black; color: white; }
  .vc-year-btn {
    padding: 7px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--aq-grey-600);
    background: transparent;
  }
  .vc-year-btn:hover { background: var(--aq-grey-100); color: black; }
  .vc-year-btn.active { background: black; color: white; }
  .vc-showing {
    font-size: 12px;
    color: var(--aq-grey-600);
    margin-top: 8px;
    flex-basis: 100%;
  }
  .vc-showing strong { color: black; font-weight: 600; }

  /* Search/filter bar */
  .filter-bar {
    background: white;
    border: 1px solid var(--aq-grey-200);
    padding: 16px 20px;
    border-radius: 2px;
    margin-bottom: 16px;
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr;
    align-items: end;
  }
  @media (min-width: 768px) {
    .filter-bar { grid-template-columns: 2fr 1fr 1fr auto auto auto; }
  }
  .filter-group label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--aq-grey-500);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .filter-input, .filter-select {
    width: 100%;
    padding: 9px 12px;
    font-size: 13px;
    border: 1px solid var(--aq-grey-300);
    background: white;
    border-radius: 2px;
  }
  .filter-input:focus, .filter-select:focus { outline: none; border-color: black; }
  .filter-btn {
    padding: 9px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    border: 1px solid var(--aq-grey-300);
    background: white;
    color: black;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { background: var(--aq-grey-100); }
  .filter-btn.primary {
    background: var(--aq-red);
    color: white;
    border-color: var(--aq-red);
  }
  .filter-btn.primary:hover { background: #b81b29; }

  /* Snapshot rollup */
  .snapshot {
    background: white;
    border: 1px solid var(--aq-grey-200);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .snapshot-header {
    background: black;
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 3px solid var(--aq-red);
  }
  .snapshot-eyebrow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--aq-red);
    font-weight: 700;
  }
  .snapshot-title {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .snapshot-body {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }
  @media (min-width: 768px) {
    .snapshot-body { grid-template-columns: 1fr 2fr 1fr 1fr 1fr; }
  }
  .snapshot-cell {
    padding: 18px 20px;
    border-right: 1px solid var(--aq-grey-200);
    border-bottom: 1px solid var(--aq-grey-100);
  }
  .snapshot-cell:last-child { border-right: none; }
  .snapshot-cell-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--aq-grey-500);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .snapshot-cell-value {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 26px;
    line-height: 1.1;
    color: var(--aq-red);
  }
  .snapshot-cell-sub {
    font-size: 11px;
    color: var(--aq-grey-500);
    margin-top: 4px;
  }
  .snapshot-regions {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .snapshot-region-item .name {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--aq-grey-700);
  }
  .snapshot-region-item .count {
    font-size: 10px;
    color: var(--aq-grey-500);
    margin: 2px 0 4px;
  }
  .snapshot-region-item .val {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 16px;
    color: black;
  }
  .snapshot-region-item.highlighted {
    background: var(--aq-red-soft);
    padding: 8px 12px;
    border: 1px solid rgba(207, 32, 47, 0.2);
    margin: -8px -12px;
  }
  .snapshot-region-item.highlighted .val { color: var(--aq-red); }

  /* Dealer roster table */
  .roster {
    background: white;
    border: 1px solid var(--aq-grey-200);
    border-radius: 2px;
    overflow: hidden;
  }
  .roster-header {
    background: black;
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .roster-header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .roster-header-title {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .roster-header-count {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;

  /* Modal */

  .pbc-year-bar {

  .pbc-kpi-row { grid-template-columns: repeat(2, 1fr); }

  .kpi-accent {

  .pbc-rollup {

  .red-strong { color: var(--aq-red) !important; font-weight: 800; font-size: 14px; }
  .pbc-totals .red-strong { color: #ff4d5c !important; }

  .pbc-chart {
    background: white;
    border: 1px solid var(--aq-grey-200);

  }
  .pbc-chart-header {

    gap: 16px;

  }
  .pbc-bar-row:last-child { margin-bottom: 0; }
  .pbc-bar-label strong {
    display: block;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.08em;

  /* Compact dealer table for PBC */
  .pbc-table { font-size: 12px; }
  .pbc-table th { font-size: 9px; padding: 8px 8px; }
  .pbc-table td { padding: 10px 8px; }
  .pbc-table .roster-dealer-name { font-size: 12px; }

  /* Extra status pill colors */
  .status-pill.on-track {
    background: #d1fadf;
    color: #027a48;
    border-color: #a6f4c5;
  }

  /* Status dropdown — looks like the pill but is a real <select> */
  .status-select-wrap {
    display: inline-flex;
    align-items: center;
    border-radius: 2px;
    position: relative;
    border: 1px solid transparent;
    transition: filter 0.15s;
  }
  .status-select-wrap:hover { filter: brightness(0.96); }
  .status-select-wrap.locked {
    background: #d1fadf;
    color: #027a48;
    border-color: #a6f4c5;
  }
  .status-select-wrap.pending {
    background: #fef0c7;
    color: #93370d;
    border-color: #fedf89;
  }
  .status-select-wrap.review {
    background: #fee4e2;
    color: #b42318;
    border-color: #fda29b;
  }
  .status-select-wrap::after {
    content: '▼';
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 8px;
    opacity: 0.6;
    pointer-events: none;
  }
  .status-select {
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: none;
    padding: 5px 24px 5px 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    color: inherit;
    cursor: pointer;
    font-family: inherit;
    min-width: 100px;
  }
  .status-select:focus {
    outline: 1px solid var(--aq-red);
    outline-offset: 1px;
  }
  .status-select option {
    background: white;
    color: black;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 600;
  }

    background: #fdecee !important;
  }
  .roster-table tr.row-danger:hover {
    background: #fbd9dc !important;
  }

    border-bottom-color: #fbb;
  }
  .row-danger-flag {

    align-items: center;

    color: white;

    letter-spacing: 0.1em;
    font-weight: 700;
    padding: 2px 6px;

    align-items: center;
    gap: 4px;
    margin-left: 6px;

    color: #93370d;

  /* SUBMIT button — Invoiced side */
  .submit-btn {
    background: var(--aq-red);
    border: 1px solid var(--aq-red);
    color: white;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 800;
    padding: 6px 12px;

  }

  .lock-btn {
    background: transparent;
    border: 1px solid var(--aq-grey-300);
    color: var(--aq-grey-700);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 2px;

  .dash-section-header {

    justify-content: space-between;
    margin-bottom: 6px;
    gap: 12px;
    flex-wrap: wrap;

    text-align: center;
    color: var(--aq-grey-400);
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 10px;
    padding: 10px 6px !important;
    background: var(--aq-grey-100) !important;
    border-right: 1px solid var(--aq-grey-200);
    position: sticky;
    left: 0;
    z-index: 5;
  }
  .master-table tr:hover .row-num { background: var(--aq-grey-200) !important; }
  .master-row-actions {
    display: flex;
    gap: 4px;
    align-items: center;
    justify-content: center;
  }
  .master-row-actions button {
    width: 22px;
    height: 22px;
    border: 1px solid var(--aq-grey-300);
    background: white;
    color: var(--aq-grey-500);
    border-radius: 2px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    transition: all 0.15s;
  }
  .master-row-actions button:hover {
    border-color: var(--aq-red);
    color: var(--aq-red);
    background: var(--aq-red-soft);
  }
  .master-row-actions .lock-mini.is-locked {
    background: black;
    color: white;
    border-color: black;
  }
  .master-row-actions .lock-mini.is-locked:hover {
    background: black;
    filter: brightness(1.1);
  }

  /* Abbreviated TM column */
  .master-table tbody td.tm-cell {
    padding: 10px 8px;
    text-align: center;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 13px;
    color: black;
    letter-spacing: 0.06em;
    background: #fafafa;
    cursor: help;
  }
  .master-table tbody tr:hover td.tm-cell { background: var(--aq-grey-100); }

  /* Single-letter Region select */
  .master-table tbody td.region-cell {
    padding: 0;
    text-align: center;
  }
  .master-table tbody td.region-cell select.region-select {
    text-align: center;
    text-align-last: center;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 14px;
    color: var(--aq-red);
    letter-spacing: 0.04em;
    padding: 10px 4px;
    cursor: pointer;
  }

  /* Auto-calculated Tier cell */
  .master-table tbody td.tier-cell {
    padding: 10px 8px;
    text-align: center;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 14px;
    color: white;
    background: var(--aq-red);
    letter-spacing: 0.04em;
    cursor: help;
  }
  .master-table tbody td.tier-cell[title*="Below"] {
    background: var(--aq-grey-100);
    color: var(--aq-grey-400);
  }

  /* Auto-calculated Co-op $ cell */
  .master-table tbody td.coop-cell {
    padding: 10px 8px;
    text-align: right;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 12px;
    font-weight: 700;
    color: #027a48;
    background: #d1fadf;
    cursor: help;
  }
  .master-table tbody tr:hover td.coop-cell { filter: brightness(0.96); }

  .master-summary {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  @media (min-width: 768px) {
    .master-summary { grid-template-columns: repeat(4, 1fr); }
  }
  .master-summary-card {
    background: white;
    border: 1px solid var(--aq-grey-200);
    border-top: 3px solid var(--aq-red);
    padding: 14px 16px;
    border-radius: 2px;
  }
  .master-summary-card .label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--aq-grey-500);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .master-summary-card .value {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 22px;
    color: black;
    line-height: 1.1;
  }
  .master-summary-card .sub {
    font-size: 10px;
    color: var(--aq-grey-500);
    margin-top: 2px;
  }

</style>
</head>

// ============================================================

function renderSectionHeader(eyebrow, title, desc) {
  return `
    <div class="section-header">
      <div class="section-eyebrow">${ICON.arrowsSmall}<span>${eyebrow}</span></div>
      <h1 class="section-title">${title}</h1>
      ${desc ? `<p class="section-desc">${desc}</p>` : ''}
    </div>
  `;
}

function renderStatCard({ label, value, sublabel, icon, tone }) {
  return `
    <div class="stat-card">
      <div class="stat-card-header">
        <div class="stat-card-label">${label}</div>
        ${icon ? `<div class="stat-card-icon">${ICON[icon] || ''}</div>` : ''}
      </div>
      <div class="stat-card-value ${tone === 'red' ? 'red' : ''}">${value}</div>
      ${sublabel ? `<div class="stat-card-sublabel">${sublabel}</div>` : ''}
    </div>
  `;
}

function renderStatusBadge(status) {
  const cls = status.tone === 'good' ? 'status-good' : status.tone === 'warn' ? 'status-warn' : 'status-neutral';
  return `<span class="status-badge ${cls}"><span class="dot"></span>${status.label}</span>`;
}

function renderAreaToggle(currentValue, callback) {
  return `
    <div class="toggle-group">
      ${AREAS.map(a => `
        <button class="toggle-btn ${currentValue === a ? 'active' : ''}" onclick="${callback}('${a}')">
          ${a === 'All Areas' ? 'All' : a}
        </button>
      `).join('')}
    </div>
  `;
}

function renderYearToggle(currentValue, callback) {
  return `
    <div class="toggle-group year">
      ${[2026, 2027].map(y => `
        <button class="toggle-btn red ${currentValue === y ? 'active' : ''}" onclick="${callback}(${y})">
          ${y} Program
        </button>
      `).join('')}
    </div>
  `;
}

// ============================================================
// PAGE: DASHBOARD
// ============================================================
function renderDashboard() {
  // ============================================================
  // DASHBOARD — premium clean operational view
  // ============================================================
  const PBC_LV = PBC_LOAD_VALUE;
  const allDealers = pbcRoster;

  // Core KPI calculations
  const totalForecastTarget = allDealers.reduce((s, d) => {
    const forecast = (d.ranchers || 0) * (d.reg[2026] || 0) * PBC_LOCKED_PEN;
    return s + (d.locked2027 || forecast);
  }, 0);
  const totalLocked = allDealers.reduce((s, d) => s + lockedIfSubmitted(d), 0);
  const remaining = Math.max(0, totalForecastTarget - totalLocked);
  const lockedPct = totalForecastTarget > 0 ? (totalLocked / totalForecastTarget) * 100 : 0;

  const lockedDealers = allDealers.filter(d => isSubmitted(d)).length;
  const totalDealers = allDealers.length;
  const dealerCommitPct = totalDealers > 0 ? Math.round((lockedDealers / totalDealers) * 100) : 0;

  const total2026Inv = allDealers.reduce((s, d) => s + (d.inv[2026] || 0), 0);
  const yoyGrowth = total2026Inv > 0 ? ((totalForecastTarget - total2026Inv) / total2026Inv) * 100 : 0;

  // Co-op 50/50 from program tiers
  const totalCoop = allDealers.reduce((s, d) => {
    const target = d.locked2027 || ((d.ranchers || 0) * (d.reg[2026] || 0) * PBC_LOCKED_PEN);
    const loads = target / PBC_LV;
    const tier = PROGRAM_TIERS[2027].find(t => loads >= t.minLoads && loads <= t.maxLoads);
    const rate = tier ? tier.coopPct / 100 : 0;
    return s + target * rate;
  }, 0);

  // Loads at $5K
  const KPI_LOAD_VALUE = 5000;
  const estLoads = Math.round(totalForecastTarget / KPI_LOAD_VALUE);

  // Locked 2027 avg deal
  const lockedAvgVals = allDealers.map(d => d.locked2027Avg).filter(v => v != null && v > 0);
  const lockedAvgDeal = lockedAvgVals.length ? lockedAvgVals.reduce((s, v) => s + v, 0) / lockedAvgVals.length : 0;

  // Counties
  const countiesAssigned = allDealers.reduce((s, d) => s + (d.counties || 0), 0);
  const TOTAL_ADDRESSABLE_COUNTIES = 3143;
  const countiesUnassigned = Math.max(0, TOTAL_ADDRESSABLE_COUNTIES - countiesAssigned);

  // Regional roll-up data — shared across multiple sections
  const rollup = ['East', 'Central', 'South', 'West', 'Exports'].map(r => {
    const dealers = allDealers.filter(d => d.region === r);
    const regVals = dealers.map(d => d.reg[2026]).filter(v => v != null && v > 0);
    const avg = regVals.length ? regVals.reduce((s, v) => s + v, 0) / regVals.length : 0;
    const ranchers = dealers.reduce((s, d) => s + (d.ranchers || 0), 0);
    const target = dealers.reduce((s, d) => {
      const f = (d.ranchers || 0) * (d.reg[2026] || 0) * PBC_LOCKED_PEN;
      return s + (d.locked2027 || f);
    }, 0);
    const locked = dealers.reduce((s, d) => s + lockedIfSubmitted(d), 0);
    const pct = target > 0 ? (locked / target) * 100 : 0;
    const loadsTotal = target / PBC_LV;
    const loadsLocked = locked / PBC_LV;
    const marketPotential = ranchers * avg;
    const penetration = marketPotential > 0 ? (target / marketPotential) * 100 : 0;
    const coop = dealers.reduce((s, d) => {
      const t = d.locked2027 || ((d.ranchers || 0) * (d.reg[2026] || 0) * PBC_LOCKED_PEN);
      const l = t / PBC_LV;
      const tier = PROGRAM_TIERS[2027].find(tt => l >= tt.minLoads && l <= tt.maxLoads);
      return s + t * (tier ? tier.coopPct / 100 : 0);
    }, 0);
    const lockedDealerCount = dealers.filter(d => isSubmitted(d)).length;
    const status = lockedDealerCount === dealers.length ? 'locked'
                 : lockedDealerCount >= dealers.length * 0.6 ? 'on-track'
                 : lockedDealerCount >= dealers.length * 0.3 ? 'pending' : 'behind';
    return { region: r, tm: PBC_TMS[r], dealers: dealers.length, ranchers, avg, penetration, target, locked, pct, loadsTotal, loadsLocked, loadsRemaining: Math.max(0, loadsTotal - loadsLocked), remaining: Math.max(0, target - locked), coop, lockedDealerCount, status };
  });
  const rollupTotals = rollup.reduce((t, r) => ({
    dealers: t.dealers + r.dealers,
    ranchers: t.ranchers + r.ranchers,
    target: t.target + r.target,
    locked: t.locked + r.locked,
    loadsTotal: t.loadsTotal + r.loadsTotal,
    coop: t.coop + r.coop,
    lockedDealerCount: t.lockedDealerCount + r.lockedDealerCount,
  }), { dealers: 0, ranchers: 0, target: 0, locked: 0, loadsTotal: 0, coop: 0, lockedDealerCount: 0 });
  const rollupAvg = rollup.filter(r => r.avg > 0).reduce((s, r) => s + r.avg, 0) / (rollup.filter(r => r.avg > 0).length || 1);
  const rollupPen = rollupTotals.ranchers * rollupAvg > 0 ? (rollupTotals.target / (rollupTotals.ranchers * rollupAvg)) * 100 : 0;

  // TM leaderboard — same data, ranked by locked $
  const leaderboard = rollup
    .filter(r => r.tm !== 'N/A')
    .map(r => ({
      ...r,
      // Deterministic mock weekly change — replace with real snapshot data when wired up
      weeklyChange: ((Math.sin(r.region.charCodeAt(0)) * 10) + 4).toFixed(1),
    }))
    .sort((a, b) => b.locked - a.locked);

  // Dealer Attention Queue
  const attentionQueue = allDealers
    .map(d => {
      const forecast = (d.ranchers || 0) * (d.reg[2026] || 0) * PBC_LOCKED_PEN;
      const gap = forecast - (d.locked2027 || 0);
      let risk = 'low', reason = 'Routine follow-up';
      if (d.status === 'pending' && gap > 1000000) { risk = 'high'; reason = 'No commitment · large opportunity'; }
      else if (d.status === 'pending') { risk = 'medium'; reason = 'No commitment yet'; }
      else if (d.status === 'review') { risk = 'medium'; reason = 'Negotiation in progress'; }
      else if (!d.locked2027) { risk = 'high'; reason = 'No locked target set'; }
      else if (gap > 500000) { risk = 'medium'; reason = 'Locked below forecast'; }
      // Mock days since last contact
      const daysUntouched = Math.abs(Math.floor(Math.sin(d.id * 7) * 30)) + 1;
      return { ...d, risk, reason, daysUntouched, gap, forecast };
    })
    .filter(d => d.risk === 'high' || d.risk === 'medium')
    .sort((a, b) => {
      const order = { high: 0, medium: 1, low: 2 };
      return order[a.risk] - order[b.risk] || b.gap - a.gap;
    })
    .slice(0, 6);

  return `
    ${renderSectionHeader('Sales Operations', 'Pre-Booking Dashboard', 'Year-over-year visibility into territory targets, dealer performance, and lock-in progress.')}

    <!-- KPI STAT GRID -->
    <div class="stat-card-grid">
      ${renderStatCard({
        label: 'Total 2027 Target',
        value: pbcCurrency(totalForecastTarget),
        sublabel: `${pbcCurrency(remaining)} left to lock in · ${(100 - lockedPct).toFixed(0)}% remaining`,
        icon: 'target',
        tone: 'red'
      })}
      ${renderStatCard({
        label: '2026 Invoiced → 2027 Forecast',
        value: `${yoyGrowth >= 0 ? '+' : ''}${yoyGrowth.toFixed(1)}%`,
        sublabel: `From ${pbcCurrency(total2026Inv)} to ${pbcCurrency(totalForecastTarget)}`,
        icon: yoyGrowth >= 0 ? 'trendUp' : 'trendDown'
      })}
      ${renderStatCard({
        label: 'Estimated Loads',
        value: estLoads.toLocaleString(),
        sublabel: `@ $${(KPI_LOAD_VALUE / 1000).toFixed(0)}K per load`,
        icon: 'truck'
      })}

      <div class="stat-card" style="border-left:4px solid var(--aq-red);">
        <div class="stat-card-header">
          <div class="stat-card-label">2027 Co-op Commitment</div>
          <div class="stat-card-icon">${ICON.wallet}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <div>
            <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:var(--aq-grey-500);font-weight:600;margin-bottom:2px;">Dealer Spend</div>
            <div style="font-family:var(--font-display);font-weight:900;font-size:20px;color:black;line-height:1;">${pbcCurrency(totalCoop / 2)}</div>
          </div>
          <div>
            <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:var(--aq-grey-500);font-weight:600;margin-bottom:2px;">Arrowquip Spend</div>
            <div style="font-family:var(--font-display);font-weight:900;font-size:20px;color:black;line-height:1;">${pbcCurrency(totalCoop / 2)}</div>
          </div>
        </div>
        <div style="border-top:1px solid var(--aq-grey-200);padding-top:8px;display:flex;justify-content:space-between;align-items:baseline;">
          <span style="font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--aq-grey-500);font-weight:600;">Total Co-op (50/50)</span>
          <span style="font-family:var(--font-display);font-weight:900;font-size:22px;color:var(--aq-red);line-height:1;">${pbcCurrency(totalCoop)}</span>
        </div>
      </div>

      ${renderStatCard({
        label: 'Locked 2027 Avg Deal Size',
        value: lockedAvgDeal > 0 ? currencyFull(lockedAvgDeal) : '—',
        sublabel: `Across ${lockedAvgVals.length} locked dealers`,
        icon: 'lock'
      })}
      ${renderStatCard({
        label: 'Dealers Confirmed Pre-Booking',
        value: `${lockedDealers}/${totalDealers}`,
        sublabel: `${dealerCommitPct}% of network locked`,
        icon: 'users',
        tone: 'red'
      })}
      ${renderStatCard({
        label: 'Counties Assigned',
        value: countiesAssigned.toLocaleString(),
        sublabel: `Across ${totalDealers} dealers`,
        icon: 'map'
      })}
      ${renderStatCard({
        label: 'Counties Unassigned',
        value: countiesUnassigned.toLocaleString(),
        sublabel: 'Open market opportunity',
        icon: 'map'
      })}
    </div>

    <!-- ===== SECTION: REGIONAL PROGRESS ===== -->
    <div class="dash-section">
      <div class="dash-section-header">
        <h2>Regional Progress</h2>
        <span class="meta">Lock-in pace by territory</span>
      </div>
      <div class="dash-regional-progress">
        ${(() => {
          // Sort regions by % locked, descending — winner at top, loser at bottom
          const sorted = [...rollup].sort((a, b) => b.pct - a.pct);
          const hasSpread = sorted.length > 1 && (sorted[0].pct - sorted[sorted.length - 1].pct) > 5;
          const winnerRegion = sorted[0]?.region;
          const loserRegion = sorted[sorted.length - 1]?.region;

          return sorted.map((r, i) => {
            const isWinner = hasSpread && r.region === winnerRegion;
            const isLoser = hasSpread && r.region === loserRegion;
            const rowClass = isWinner ? 'winner' : isLoser ? 'loser' : '';
            const barClass = isWinner ? 'green' : isLoser ? 'red' : r.pct < 50 ? 'red' : '';
            const positionTag = isWinner
              ? '<span class="dash-position winner">▲ Leader</span>'
              : isLoser
                ? '<span class="dash-position loser">▼ Lagging</span>'
                : '';
            return `
              <div class="dash-progress-row ${rowClass}">
                <div class="dash-progress-top">
                  <div class="dash-progress-region">
                    <span class="dash-rank-num">${i + 1}</span>
                    <span class="name">${r.region}</span>
                    <span class="tm">${r.tm}</span>
                    ${positionTag}
                  </div>
                  <span class="dash-progress-pct">${r.pct.toFixed(0)}%</span>
                </div>
                <div class="dash-progress-bar">
                  <div class="dash-progress-bar-fill ${barClass}" style="width:${Math.min(100, r.pct)}%"></div>
                </div>
                <div class="dash-progress-detail">
                  <span>Target <strong>${pbcCurrency(r.target)}</strong></span>
                  <span>Locked <strong>${pbcCurrency(r.locked)}</strong></span>
                  <span>Remaining <strong>${pbcCurrency(r.remaining)}</strong></span>
                  <span>Loads <strong>${r.loadsTotal.toFixed(1)}</strong></span>
                </div>
              </div>
            `;
          }).join('');
        })()}
      </div>
    </div>

    <!-- ===== SECTION: WEEKLY MOMENTUM ===== -->
    <div class="dash-section">
      <div class="dash-section-header">
        <h2>This Week</h2>
        <span class="meta">Network momentum</span>
      </div>
      <div class="dash-momentum">
        <div class="dash-mom-card">
          <div class="label">Revenue Locked</div>
          <div class="value"><span class="arrow">↑</span>$1.6M</div>
          <div class="sub">+18% week over week</div>
        </div>
        <div class="dash-mom-card">
          <div class="label">Dealers Committed</div>
          <div class="value"><span class="arrow">↑</span>+4</div>
          <div class="sub">Net new commitments</div>
        </div>
        <div class="dash-mom-card">
          <div class="label">Loads Added</div>
          <div class="value"><span class="arrow">↑</span>+11</div>
          <div class="sub">Locked load count</div>
        </div>
      </div>
    </div>
    <div class="dash-section">
      <div class="dash-section-header">
        <h2>Dealer Attention Queue</h2>
        <span class="meta">${attentionQueue.length} requiring action</span>
      </div>
      <table class="dash-attention">
        <thead>
          <tr>
            <th>Dealer</th>
            <th>Region</th>
            <th>Risk</th>
            <th>Reason</th>
            <th class="right">Target Gap</th>
            <th class="right">Last Contact</th>
          </tr>
        </thead>
        <tbody>
          ${attentionQueue.length === 0 ? `
            <tr><td colspan="6" style="padding:32px;text-align:center;color:var(--aq-grey-400);font-style:italic;">All dealers in good standing.</td></tr>
          ` : attentionQueue.map(d => `
            <tr>
              <td><span class="dealer-name">${d.name}</span></td>
              <td>${d.region}</td>
              <td><span class="dash-risk-tag ${d.risk}">${d.risk}</span></td>
              <td style="font-size:12px;">${d.reason}</td>
              <td class="right" style="color:black;font-weight:700;">${pbcCurrency(d.gap)}</td>
              <td class="right">${d.daysUntouched}d ago</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <!-- ===== SECTION: REGIONAL ROLL-UP (kept from existing) ===== -->
    <div class="dash-section">
      <div class="dash-section-header">
        <h2>Regional Roll-Up</h2>
        <span class="meta">Full performance breakdown</span>
      </div>
      <div class="pbc-rollup">
        <div style="overflow-x:auto;">
          <table class="roster-table pbc-rollup-table">
            <thead>
              <tr>
                <th style="width:50px;">#</th>
                <th>Region</th>
                <th>Territory Manager</th>
                <th class="right">Dealers</th>
                <th class="right">Ranchers</th>
                <th class="right">Avg Deal Size</th>
                <th class="right">Market Penetration</th>
                <th class="right">Target</th>
                <th class="right">Loads</th>
                <th class="right">Co-op</th>
                <th class="right">Locked</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${(() => {
                const sorted = [...rollup].sort((a, b) => b.pct - a.pct);
                const wRegion = sorted[0]?.region;
                const lRegion = sorted[sorted.length - 1]?.region;
                const hasSpread = sorted.length > 1 && (sorted[0].pct - sorted[sorted.length - 1].pct) > 5;
                return sorted.map((r, i) => {
                  const isWinner = hasSpread && r.region === wRegion;
                  const isLoser = hasSpread && r.region === lRegion;
                  const rowClass = isWinner ? 'rollup-winner' : isLoser ? 'rollup-loser' : '';
                  return `
                    <tr class="${rowClass}">
                      <td style="font-family:var(--font-display);font-weight:900;font-size:16px;color:${isWinner ? '#027a48' : isLoser ? 'var(--aq-red)' : 'var(--aq-grey-400)'};text-align:center;">${i + 1}</td>
                      <td><div class="roster-dealer-name">${r.region.toUpperCase()}</div></td>
                      <td>${r.tm}</td>
                      <td class="right mono">${r.dealers}</td>
                      <td class="right mono">${r.ranchers.toLocaleString()}</td>
                      <td class="right mono">$${Math.round(r.avg).toLocaleString()}</td>
                      <td class="right mono">${r.penetration.toFixed(2)}%</td>
                      <td class="right mono" style="color:black;font-weight:700;">${pbcCurrency(r.target)}</td>
                      <td class="right mono">${r.loadsTotal.toFixed(1)}</td>
                      <td class="right mono red-strong">${pbcCurrency(r.coop)}</td>
                      <td class="right mono">${r.lockedDealerCount}/${r.dealers}</td>
                      <td>${pbcStatusPill(r.status, false)}</td>
                    </tr>
                  `;
                }).join('');
              })()}
              <tr class="pbc-totals">
                <td colspan="3"><strong>TOTAL — ALL REGIONS</strong></td>
                <td class="right mono"><strong>${rollupTotals.dealers}</strong></td>
                <td class="right mono"><strong>${rollupTotals.ranchers.toLocaleString()}</strong></td>
                <td class="right mono"><strong>$${Math.round(rollupAvg).toLocaleString()}</strong></td>
                <td class="right mono"><strong>${rollupPen.toFixed(2)}%</strong></td>
                <td class="right mono red-strong">${pbcCurrency(rollupTotals.target)}</td>

// PAGE: AREA VIEW
// ============================================================
function renderAreaView() {
  // Pull from pbcRoster (source of truth) so this matches Dashboard
  const data = ['East', 'Central', 'South', 'West', 'Exports'].map(a => {
    const dealers = pbcRoster.filter(d => d.region === a);
    // Forecast = full pipeline (uses locked2027 if set, otherwise calculated forecast)
    const target = dealers.reduce((s, d) => {
      const f = (d.ranchers || 0) * (d.reg[2026] || 0) * PBC_LOCKED_PEN;
      return s + (d.locked2027 || f);
    }, 0);
    // Locked = ONLY dealers who have submitted/confirmed their commitment
    const locked = dealers.reduce((s, d) => s + lockedIfSubmitted(d), 0);
    const invoiced2026 = dealers.reduce((s, d) => s + (d.inv[2026] || 0), 0);
    const invoiced2025 = dealers.reduce((s, d) => s + (d.inv[2025] || 0), 0);
    const growth = invoiced2025 ? ((invoiced2026 - invoiced2025) / invoiced2025) * 100 : 0;
    const pct = target > 0 ? (locked / target) * 100 : 0;
    const loads = target / PBC_LOAD_VALUE;
    const loadsLocked = locked / PBC_LOAD_VALUE;
    const ranchers = dealers.reduce((s, d) => s + (d.ranchers || 0), 0);
    const counties = dealers.reduce((s, d) => s + (d.counties || 0), 0);
    const submittedDealers = dealers.filter(d => isSubmitted(d)).length;
    const pendingDealers = dealers.length - submittedDealers;
    // Co-op (using submitted dealers only — matches Dashboard)
    const coop = dealers.reduce((s, d) => {
      if (!isSubmitted(d)) return s;
      const t = d.locked2027 || 0;
      const l = t / PBC_LOAD_VALUE;
      const tier = PROGRAM_TIERS[2027].find(tt => l >= tt.minLoads && l <= tt.maxLoads);
      return s + t * (tier ? tier.coopPct / 100 : 0);
    }, 0);
    return { area: a, dealers, target, locked, invoiced2026, growth, pct, loads, loadsLocked, ranchers, counties, submittedDealers, pendingDealers, coop };
  });

  // Helper: TM avatar — real photo or initials fallback
  const tmAvatar = (area, tmName) => {
    const photo = PBC_TM_PHOTOS[area];
    if (photo) {
      return `<div class="tm-avatar" style="background-image:url('${photo}');background-color:transparent;"></div>`;
    }
    const initials = tmName && tmName !== 'N/A'
      ? tmName.split(' ').map(n => n.charAt(0).toUpperCase()).join('').slice(0, 2)
      : '—';
    const cls = 'placeholder-' + area.toLowerCase();
    return `<div class="tm-avatar ${cls}">${initials}</div>`;
  };

  return `
    ${renderSectionHeader('By Territory', 'Area Scorecards', "Territory-level pre-booking overview. Each scorecard summarizes locked-in revenue, dealer commitment status, and YoY performance. Numbers update once dealers submit their signed pre-bookings.")}

    <div class="area-scorecard-grid">
      ${data.map(d => {
        const tone = d.pct >= 75 ? 'winning' : d.pct < 50 ? 'behind' : '';
        const tmName = PBC_TMS[d.area];
        return `
          <div class="area-scorecard ${tone}">

            <!-- TOP: TM + region identity -->
            <div class="scorecard-top">
              ${tmAvatar(d.area, tmName)}
              <div class="scorecard-id">
                <div class="scorecard-region">${d.area}</div>
                <div class="scorecard-tm">Territory Manager · <strong>${tmName}</strong></div>
              </div>
              <div class="scorecard-status-tag ${tone || 'neutral'}">
                ${d.pct >= 75 ? '▲ Winning' : d.pct < 50 ? '▼ Behind' : '— On Pace'}
              </div>
            </div>

            <!-- HERO: locked of target -->
            <div class="scorecard-hero">
              <div class="scorecard-hero-num">${pbcCurrency(d.locked)}</div>
              <div class="scorecard-hero-meta">
                of <strong>${pbcCurrency(d.target)}</strong> target
                <span class="scorecard-hero-pct ${tone}">${d.pct.toFixed(0)}%</span>
              </div>
              <div class="scorecard-bar">
                <div class="scorecard-bar-fill ${tone}" style="width:${Math.min(100, d.pct)}%"></div>
              </div>
            </div>

            <!-- STATS GRID -->
            <div class="scorecard-stats">
              <div class="scorecard-stat">
                <div class="label">Dealers Submitted</div>
                <div class="value">${d.submittedDealers}<span class="of">/${d.dealers.length}</span></div>
                ${d.pendingDealers > 0 ? `<div class="sub red">${d.pendingDealers} awaiting</div>` : `<div class="sub green">All confirmed</div>`}
              </div>
              <div class="scorecard-stat">
                <div class="label">Loads Locked</div>
                <div class="value">${d.loadsLocked.toFixed(1)}<span class="of">/${d.loads.toFixed(0)}</span></div>
                <div class="sub">of required loads</div>
              </div>
              <div class="scorecard-stat">
                <div class="label">2026 Invoiced</div>
                <div class="value">${pbcCurrency(d.invoiced2026)}</div>
                <div class="sub ${d.growth >= 0 ? 'green' : 'red'}">${d.growth >= 0 ? '+' : ''}${d.growth.toFixed(1)}% YoY</div>
              </div>
              <div class="scorecard-stat">
                <div class="label">Co-op Committed</div>
                <div class="value red-num">${pbcCurrency(d.coop)}</div>
                <div class="sub">submitted dealers</div>
              </div>
              <div class="scorecard-stat">
                <div class="label">Ranchers</div>
                <div class="value">${d.ranchers.toLocaleString()}</div>
                <div class="sub">${d.counties} counties</div>
              </div>
              <div class="scorecard-stat">
                <div class="label">Remaining</div>
                <div class="value">${pbcCurrency(Math.max(0, d.target - d.locked))}</div>
                <div class="sub">left to lock in</div>
              </div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderTiers() {
  const tiers = PROGRAM_TIERS[state.tierYear];
  const prior = PROGRAM_TIERS[2026];

  // FORECAST: where dealers will land based on their locked 2027 commitment (or fallback forecast)
  const dealersForecastInTier = (t) => pbcRoster.filter(d => {
    const target = d.locked2027 || ((d.ranchers || 0) * (d.reg[2026] || 0) * PBC_LOCKED_PEN);
    const loads = target / PBC_LOAD_VALUE;
    return loads >= t.minLoads && loads <= t.maxLoads;
  });

  // ACTUAL: where dealers have actually landed based on shipped/invoiced sales for the program year
  // For 2027 we use current 2026 invoiced as the most recent shipped-volume signal (per data brief);
  // for 2026 we use 2026 invoiced directly.
  const dealersActualInTier = (t) => pbcRoster.filter(d => {
    const invoiced = d.inv[2026] || 0;
    const loads = invoiced / PBC_LOAD_VALUE;
    return loads >= t.minLoads && loads <= t.maxLoads;
  });

  const formatLoadRange = (t) => {
    if (t.maxLoads === Infinity) return `${t.minLoads}+`;
    return `${t.minLoads} – ${t.maxLoads}`;
  };

  return `
    <div class="top-bar">
      ${renderSectionHeader('Programs', 'Tier Structure', 'Pre-booking tier rewards by load volume. Higher load commitments earn deeper margin and more marketing co-op.')}
      ${renderYearToggle(state.tierYear, 'setTierYear')}
    </div>

    ${state.tierYear === 2026 ? `
      <div class="alert red-bg">
        ${ICON.info}
        <div class="alert-text"><strong>2026 was the first pre-booking year.</strong> These tiers reflect that pilot year's structure. The 2027 program features deeper margin and broader co-op support across every tier.</div>
      </div>
    ` : ''}

    <!-- TIER BREAKDOWN TABLE -->
    <div class="tier-breakdown">
      <div class="tier-breakdown-header">
        <span class="tier-breakdown-title">${state.tierYear} Pre-Booking Program · Tier Structure</span>
        <span class="tier-breakdown-meta">${tiers.length} Tiers · Sorted by Volume</span>
      </div>
      <table class="tier-table">
        <thead>
          <tr>
            <th style="width:60px;">Tier</th>
            <th>Loads Committed</th>
            <th class="right">Margin</th>
            <th class="right">Marketing Co-Op</th>
            <th class="right">Dealers · Forecast</th>
            <th class="right">Dealers · Actual</th>
          </tr>
        </thead>
        <tbody>
          ${tiers.map((t, i) => {
            const forecast = dealersForecastInTier(t);
            const actual = dealersActualInTier(t);
            const delta = actual.length - forecast.length;
            return `
              <tr class="${i === 0 ? 'tier-top' : ''}">
                <td><span class="tier-num">${i + 1}</span></td>
                <td>
                  <span class="tier-loads">${formatLoadRange(t)}</span>
                  <span class="tier-loads-unit">loads</span>
                </td>
                <td class="right"><span class="tier-discount">${t.discountPct}%</span></td>
                <td class="right"><span class="tier-coop">${t.coopPct.toFixed(2)}%</span></td>
                <td class="right"><span class="tier-dealers-count tier-forecast-pill">${forecast.length}</span></td>
                <td class="right">
                  <span class="tier-dealers-count tier-actual-pill">${actual.length}</span>
                  ${delta !== 0 ? `<span class="tier-delta ${delta > 0 ? 'up' : 'down'}">${delta > 0 ? '+' : ''}${delta}</span>` : ''}
                </td>
              </tr>
            `;

        </tbody>
      </table>
    </div>

    <!-- DEALERS PER TIER — FORECAST vs ACTUAL -->
    <div class="mt-10">

        <span class="dpt-legend-item"><span class="sw-forecast"></span>Forecast — based on pre-book commitment</span>

          <h3>Who Can Enroll</h3>
          <ul>
            <li>Active <strong>Authorized Arrowquip Dealers</strong> in good standing.</li>

function renderCoop() {
  const filtered = state.coopAreaFilter === 'All Areas' ? DEALERS : DEALERS.filter(d => d.area === state.coopAreaFilter);
  const totalCoop2026 = filtered.reduce((s, d) => s + d.coop2026, 0);
  const totalCoop2027 = filtered.reduce((s, d) => {
    const t = calc2027Target(d);
    return s + t * (getTier(t, 2027).coopPct / 100);
  }, 0);
  const growth = totalCoop2026 ? ((totalCoop2027 - totalCoop2026) / totalCoop2026) * 100 : 0;

  return `

      ${renderStatCard({ label: 'YoY Change', value: `${growth >= 0 ? '+' : ''}${growth.toFixed(1)}%`, icon: growth >= 0 ? 'trendUp' : 'trendDown', sublabel: 'Co-op growth' })}

              <th>Dealer</th>
              <th>Area</th>
              <th class="right">2027 Target</th>
              <th>Tier</th>
              <th class="right">Co-op %</th>
              <th class="right">2026 Received</th>
              <th class="right">2027 Projected</th>
              <th class="right">Δ</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map((d, i) => {
              const t = calc2027Target(d);
              const tier = getTier(t, 2027);
              const c27 = t * (tier.coopPct / 100);
              const delta = d.coop2026 ? ((c27 - d.coop2026) / d.coop2026) * 100 : 0;
              return `
                <tr class="${i % 2 === 1 ? 'alt' : ''}">
                  <td class="black">${d.name}</td>
                  <td>${d.area}</td>
                  <td class="right mono black">${currency(t)}</td>
                  <td><span style="display:inline-block;padding:2px 8px;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;background:var(--aq-grey-100);color:black;">${tier.tier}</span></td>

                  <td class="right mono">${currencyFull(d.coop2026)}</td>

                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}
