function renderDealerPortal() {
  const inRegion = pbcState.region === 'All Regions'
    ? pbcRoster
    : pbcRoster.filter(d => d.region === pbcState.region);

  const visible = inRegion.filter(d => {
    if (pbcState.search && !d.name.toLowerCase().includes(pbcState.search.toLowerCase())) return false;
    if (pbcState.stateFilter !== 'All States' && d.state !== pbcState.stateFilter) return false;
    if (pbcState.statusFilter !== 'All Statuses') {
      const filterMap = { 'Approved': 'locked', 'Pending': 'pending', 'Needs Review': 'review' };
      const slug = filterMap[pbcState.statusFilter] || pbcState.statusFilter.toLowerCase().replace(' ', '-');
      if (d.status !== slug) return false;
    }
    return true;
  });

  // Forecast year drives "current" — 2026 in invoiced mode (per brief: 2026 first pre-book year = invoiced),
  // 2026 reg in registrations mode (most recent reg data)
  const currentYear = 2026;

  // ----- KPI calculations -----
  const regVals = inRegion.map(d => d.reg[currentYear]).filter(v => v != null && v > 0);
  const avgDealSize = regVals.length ? regVals.reduce((s, v) => s + v, 0) / regVals.length : 0;
  const totalRanchers = inRegion.reduce((s, d) => s + (d.ranchers || 0), 0);
  const forecastTarget = inRegion.reduce((s, d) => s + (d.ranchers || 0) * (d.reg[currentYear] || 0) * PBC_LOCKED_PEN, 0);
  const requiredLoads = forecastTarget / PBC_LOAD_VALUE;

  const totalInvoiced = inRegion.reduce((s, d) => s + (d.inv[currentYear] || 0), 0);
  const loadEquivalent = totalInvoiced / PBC_LOAD_VALUE;
  const totalLocked = inRegion.reduce((s, d) => s + (d.locked2027 || 0), 0);
  const attainment = totalLocked > 0 ? (totalInvoiced / totalLocked) * 100 : 0;

  const lockedCount = inRegion.filter(d => d.status === 'locked').length;
  const onTrackCount = inRegion.filter(d => d.status === 'on-track' || d.status === 'locked').length;
  const totalDealers = inRegion.length;

  // ----- Roll-up by region -----
  const rollup = ['East', 'Central', 'South', 'West', 'Exports'].map(r => {
    const dealers = pbcRoster.filter(d => d.region === r);
    const regVals = dealers.map(d => d.reg[currentYear]).filter(v => v != null && v > 0);
    const avg = regVals.length ? regVals.reduce((s, v) => s + v, 0) / regVals.length : 0;
    const ranchers = dealers.reduce((s, d) => s + (d.ranchers || 0), 0);
    const target = dealers.reduce((s, d) => s + (d.ranchers || 0) * (d.reg[currentYear] || 0) * PBC_LOCKED_PEN, 0);
    const invoiced = dealers.reduce((s, d) => s + (d.inv[currentYear] || 0), 0);
    const locked = dealers.reduce((s, d) => s + (d.locked2027 || 0), 0);
    const loads = pbcState.mode === 'registrations' ? target / PBC_LOAD_VALUE : invoiced / PBC_LOAD_VALUE;
    const lockedDealers = dealers.filter(d => isSubmitted(d)).length;
    const status = lockedDealers === dealers.length ? 'locked'
                 : lockedDealers >= dealers.length * 0.6 ? 'on-track'
                 : lockedDealers >= dealers.length * 0.3 ? 'pending' : 'behind';
    return { region: r, tm: PBC_TMS[r], dealers: dealers.length, ranchers, avg, target, invoiced, locked, loads, lockedDealers, status };
  });

  const allStates = ['All States', ...new Set(pbcRoster.map(d => d.state))].filter(Boolean).sort();

  // ----- KPI CARDS based on mode -----
  const kpis = pbcState.mode === 'registrations' ? [
    { label: 'Company Avg Deal Size', value: '$' + Math.round(avgDealSize).toLocaleString(), sub: `${totalDealers} dealers · 2026 reg data` },
    { label: 'Assigned Rancher Count', value: totalRanchers.toLocaleString(), sub: 'From assigned counties' },
    { label: 'Locked Penetration', value: '1.5%', sub: 'Locked default — non-editable' },
    { label: 'Forecasted Pre-Booking Target', value: pbcCurrency(forecastTarget), sub: `Ranchers × Avg Deal × 1.5%`, accent: true },
    { label: 'Required Loads', value: requiredLoads.toFixed(1), sub: `@ $${PBC_LOAD_VALUE/1000}K per load` },
    { label: 'Dealers Locked for 2027', value: `${lockedCount}/${totalDealers}`, sub: `${totalDealers ? Math.round((lockedCount/totalDealers)*100) : 0}% commitment rate` },
  ] : [
    { label: 'Total Invoiced Sales', value: pbcCurrency(totalInvoiced), sub: '2026 actuals' },
    { label: 'Avg Load Value', value: '$' + PBC_LOAD_VALUE.toLocaleString(), sub: 'Per shipped load' },
    { label: 'Loads Equivalent', value: loadEquivalent.toFixed(1), sub: 'Invoiced ÷ load value' },
    { label: '2027 Target', value: pbcCurrency(totalLocked), sub: 'Sum of locked-in targets', accent: true },
    { label: 'Target Attainment', value: `${attainment.toFixed(0)}%`, sub: 'Invoiced ÷ Target' },
    { label: 'Dealers On Track', value: `${onTrackCount}/${totalDealers}`, sub: 'Locked or on-track status' },
  ];

  return `
    ${!pbcState.saveWarnDismissed ? `
      <div class="save-warn" id="saveWarn">
        <div><strong>Session Save:</strong> Changes are held in this browser session. Use <strong>Export CSV</strong> to back up. Future versions will sync to Google Sheets / Supabase / SQL.</div>

      </div>
    ` : ''}

    <div class="ads-header">
      <div>
        <div class="section-eyebrow">${ICON.arrowsSmall}<span>Operational Command</span></div>
        <div class="ads-title">Pre-Booking Calculator</div>

      <div class="ads-meta">
        <strong>Mode</strong>
        ${pbcState.mode === 'registrations' ? 'Forecasting' : 'Performance'}

        <strong>Year</strong>

    <!-- MODE TOGGLE — primary global control -->
    <div class="pbc-mode-bar">

      <button class="pbc-mode-btn ${pbcState.mode === 'registrations' ? 'active' : ''}" onclick="pbcSetMode('registrations')">

      <div class="pbc-mode-divider"></div>
      <span class="pbc-mode-hint">
        ${pbcState.mode === 'registrations'
          ? 'Forecasting · avg deal size · pre-book targets · county opportunity'

      </span>
    </div>

    <!-- REGION + YEAR FILTERS -->
    <div class="region-tabs">
      ${PBC_REGIONS.map(r => `
        <button class="region-tab ${pbcState.region === r ? 'active' : ''}" onclick="pbcSetRegion('${r}')">
          ${r.toUpperCase()}
          <span class="count">${r === 'All Regions' ? pbcRoster.length : pbcRoster.filter(d => d.region === r).length}</span>
        </button>
      `).join('')}
    </div>

    <!-- KPI CARDS -->
    <div class="kpi-row pbc-kpi-row">
      ${kpis.map(k => `
        <div class="kpi-card ${k.accent ? 'kpi-accent' : ''}">
          <div class="kpi-card-label">${k.label}</div>
          <div class="kpi-card-value ${k.accent ? 'red' : ''}">${k.value}</div>
          <div class="kpi-card-sub">${k.sub}</div>
        </div>
      `).join('')}
    </div>

    <!-- FILTER / ACTION BAR -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>Search Dealer</label>
        <input type="text" class="filter-input" placeholder="Type a dealer name..." value="${pbcState.search}" oninput="pbcSetSearch(this.value)" />
      </div>
      <div class="filter-group">
        <label>State / Province</label>
        <select class="filter-select" onchange="pbcSetStateFilter(this.value)">
          ${allStates.map(s => `<option ${pbcState.stateFilter === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select class="filter-select" onchange="pbcSetStatusFilter(this.value)">
          ${['All Statuses', 'Approved', 'Pending', 'Needs Review'].map(s => `<option ${pbcState.statusFilter === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </div>
      <button class="filter-btn" onclick="document.getElementById('importFile').click()">↑ Import</button>
      <button class="filter-btn" onclick="pbcExportCSV()">↓ Export CSV</button>
      <button class="filter-btn primary" onclick="pbcOpenAdd()">+ Add Dealer</button>
    </div>

    <!-- DEALER TABLE -->
    <div class="roster">
      <div class="roster-header">
        <div class="roster-header-left">
          <span class="roster-header-title">Dealer Roster · ${pbcState.mode === 'registrations' ? 'Registrations' : 'Invoiced'} Mode</span>
          <span class="roster-header-count">·&nbsp;&nbsp;${visible.length} of ${pbcRoster.length} dealers shown</span>
        </div>
        <div class="roster-header-hint">Click status to cycle&nbsp;·&nbsp;<span class="x">×</span> to delete</div>
      </div>
      <div style="overflow-x:auto;">
        ${pbcState.mode === 'registrations'
          ? pbcRenderRegistrationsTable(visible, rollup)
          : pbcRenderInvoicedTable(visible)
        }
      </div>
    </div>

    <div class="ads-footer-strip">
      <span><strong>AQ-PRE-2027</strong> · Operational Command</span>
      <span>Mode: <strong>${pbcState.mode === 'registrations' ? 'REGISTRATIONS' : 'INVOICED SALES'}</strong> · Region: <strong>${pbcState.region.toUpperCase()}</strong></span>
      <span>Auto-save · Local Session</span>
    </div>
  `;
}

// ============================================================
// PBC — Table renderers
// ============================================================
function pbcRenderRegistrationsTable(dealers, rollup) {
  if (!dealers.length) {
    return `<div class="empty-state"><div class="title">No Dealers Match</div><div>Try clearing the search or filters.</div></div>`;
  }
  return `
    <table class="roster-table pbc-table">
      <thead>
        <tr>
          <th>Dealer</th>
          <th>State</th>
          <th>Region</th>
          <th class="right">2023</th>
          <th class="right">2024</th>
          <th class="right">2025</th>
          <th class="right">2026</th>
          <th class="right">Region Avg Deal</th>
          <th class="right">2027 Avg Deal</th>
          <th>Override</th>
          <th>Status</th>
          <th>Lock</th>
          <th>Notes</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${dealers.map(d => {
          const regionAvg = rollup.find(r => r.region === d.region)?.avg || 0;
          const isLocked = !!d.adminLocked;
          return `
            <tr class="${isLocked ? 'locked-row' : ''}">
              <td class="roster-dealer-cell">
                <div class="roster-dealer-name">${d.name}</div>
              </td>
              <td>${d.state}</td>
              <td>${d.region}</td>
              ${[2023,2024,2025,2026].map(y => {
                const v = d.reg[y];
                const cur = y === 2026;
                return v == null ? `<td class="dash">—</td>` : `<td class="right mono ${cur ? 'current-year' : ''}">$${v.toLocaleString()}</td>`;
              }).join('')}
              <td class="right mono" style="color:var(--aq-grey-600);">$${Math.round(regionAvg).toLocaleString()}</td>
              <td class="right mono red-strong">
                <input type="number" class="inline-num-input" value="${d.locked2027Avg || ''}" placeholder="TBD" ${isLocked ? 'readonly' : ''} onchange="pbcUpdateNum(${d.id}, 'locked2027Avg', this.value)" />
              </td>
              <td class="override-cell"><input type="text" value="${d.override || ''}" placeholder="—" ${isLocked ? 'readonly' : ''} onchange="pbcUpdateField(${d.id}, 'override', this.value)" /></td>
              <td>${pbcStatusPill(d.status, !isLocked, d.id)}</td>
              <td>
                ${isLocked
                  ? `<button class="lock-btn is-locked" onclick="pbcRequestUnlock(${d.id})" title="Admin approval required to unlock">${ICON.lockSmall} Locked</button>`
                  : `<button class="lock-btn" onclick="pbcLockDealer(${d.id})" title="Lock this dealer's 2027 avg deal — admin approval required to unlock">${ICON.lockSmall} Lock</button>`
                }
              </td>
              <td class="override-cell"><input type="text" value="${d.notes || ''}" placeholder="—" ${isLocked ? 'readonly' : ''} onchange="pbcUpdateField(${d.id}, 'notes', this.value)" /></td>
              <td><button class="delete-btn" onclick="pbcDelete(${d.id})" title="Delete" ${isLocked ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : ''}>×</button></td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function pbcRenderInvoicedTable(dealers) {
  if (!dealers.length) {
    return `<div class="empty-state"><div class="title">No Dealers Match</div><div>Try clearing the search or filters.</div></div>`;
  }
  // Helper: look up co-op rate from the 2027 PROGRAM_TIERS config (editable via Program Details tab)
  const tiers2027 = PROGRAM_TIERS[2027] || [];
  function lookupCoopRate(amount) {
    if (!amount) return 0;
    const loads = amount / PBC_LOAD_VALUE;
    const tier = tiers2027.find(t => loads >= t.minLoads && loads <= t.maxLoads);
    return tier ? tier.coopPct / 100 : 0;
  }
  function lookupTierName(amount) {
    if (!amount) return '—';
    const loads = amount / PBC_LOAD_VALUE;
    const tier = tiers2027.find(t => loads >= t.minLoads && loads <= t.maxLoads);
    return tier ? tier.tier : '—';
  }

  return `
    <table class="roster-table pbc-table">
      <thead>
        <tr>
          <th>Dealer</th>
          <th>State</th>
          <th class="right">2023</th>
          <th class="right">2024</th>
          <th class="right">2025</th>
          <th class="right">2026</th>
          <th class="right">2027 Target</th>
          <th class="right">Growth vs 2026</th>
          <th class="right">Co-op</th>
          <th>Status</th>
          <th>Notes</th>
          <th title="Submit confirmed pre-booking to the network — once submitted, this dealer rolls into Dashboard and Area View totals">Submit</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${dealers.map(d => {
          const current = d.inv[2026] || 0;
          const target = d.locked2027 || 0;
          const growth = current ? ((target - current) / current) * 100 : 0;
          const coopRate = lookupCoopRate(target);
          const tierName = lookupTierName(target);
          const coop = target * coopRate;
          // Red-row flag: growth below 2% threshold (and only if both numbers exist)
          const lowGrowth = current > 0 && target > 0 && growth < 2;
          const submitted = isSubmitted(d);
          return `
            <tr class="${lowGrowth ? 'row-danger' : ''} ${submitted ? 'row-submitted' : 'row-unsubmitted'}">
              <td class="roster-dealer-cell">
                <div class="roster-dealer-name">${d.name}</div>
                ${lowGrowth ? `<span class="row-danger-flag">⚠ Low Growth</span>` : ''}
                ${!submitted && target > 0 ? `<span class="row-pending-flag">⏳ Not yet submitted</span>` : ''}
              </td>
              <td>${d.state}</td>
              ${[2023,2024,2025,2026].map(y => {
                const v = d.inv[y];
                const cur = y === 2026;
                return v == null ? `<td class="dash">—</td>` : `<td class="right mono ${cur ? 'current-year' : ''}">${pbcCurrency(v)}</td>`;
              }).join('')}
              <td class="right mono" style="color:black;font-weight:700;">
                <input type="number" class="inline-num-input" value="${target || ''}" placeholder="TBD" onchange="pbcUpdateNum(${d.id}, 'locked2027', this.value)" />
              </td>
              <td class="right"><span class="${growth >= 2 ? 'diff-up' : 'diff-down'}" style="font-weight:700;">${growth >= 0 ? '+' : ''}${growth.toFixed(1)}%</span></td>
              <td class="right mono red-strong" title="${tierName} tier · ${(coopRate*100).toFixed(1)}%">${pbcCurrency(coop)}</td>
              <td>${pbcStatusPill(d.status, true, d.id)}</td>
              <td class="override-cell"><input type="text" value="${d.notes || ''}" placeholder="—" onchange="pbcUpdateField(${d.id}, 'notes', this.value)" /></td>
              <td>
                ${submitted
                  ? `<button class="submit-btn is-submitted" onclick="pbcUnsubmit(${d.id})" title="Withdraw submission — removes from Dashboard/Area View totals">✓ Submitted</button>`
                  : `<button class="submit-btn" onclick="pbcSubmit(${d.id})" title="Confirm pre-booking — adds to Dashboard and Area View totals" ${!target ? 'disabled' : ''}>Submit</button>`
                }
              </td>
              <td><button class="delete-btn" onclick="pbcDelete(${d.id})" title="Delete">×</button></td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

// ============================================================
// PBC — Helpers
// ============================================================
function pbcCurrency(n) {
  if (!n) return '$0';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + (n/1000).toFixed(0) + 'K';
  return '$' + Math.round(n).toLocaleString();
}

function pbcStatusPill(status, clickable, id) {
  const map = {
    'locked':   { label: 'Approved',     cls: 'locked' },
    'pending':  { label: 'Pending',      cls: 'pending' },
    'review':   { label: 'Needs Review', cls: 'review' },
    // Legacy mappings (still rendered if data has them)
    'flagged':  { label: 'Flagged',      cls: 'review' },
    'on-track': { label: 'On Track',     cls: 'on-track' },
    'behind':   { label: 'Behind',       cls: 'review' },
  };
  const s = map[status] || map['pending'];
  if (!clickable) {
    return `<span class="status-pill ${s.cls}">${s.label}</span>`;
  }
  // Real dropdown — picks between the three canonical statuses
  const options = [
    { v: 'pending', label: 'Pending' },
    { v: 'review',  label: 'Needs Review' },
    { v: 'locked',  label: 'Approved' },
  ];
  const current = ['pending', 'review', 'locked'].includes(status) ? status : 'pending';
  return `
    <div class="status-select-wrap status-pill-bg ${s.cls}">
      <select class="status-select" onchange="pbcSetStatus(${id}, this.value)">
        ${options.map(o => `<option value="${o.v}" ${o.v === current ? 'selected' : ''}>${o.label}</option>`).join('')}
      </select>
    </div>
  `;
}

function pbcSetStatus(id, value) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  if (d.adminLocked) {
    alert(`🔒 ${d.name} is locked. Status cannot be changed without admin unlock.`);
    render();
    return;
  }
  d.status = value;
  render();
}

// ============================================================
// PBC — Event handlers
// ============================================================
function pbcSetMode(m) { pbcState.mode = m; render(); }
function pbcSetRegion(r) { pbcState.region = r; render(); }
function pbcSetYear(y) { pbcState.programYear = y; render(); }
function pbcSetStateFilter(v) { pbcState.stateFilter = v; render(); }
function pbcSetStatusFilter(v) { pbcState.statusFilter = v; render(); }
function dismissSaveWarn() { pbcState.saveWarnDismissed = true; render(); }

function pbcSetSearch(v) {
  pbcState.search = v;
  // Partial re-render to preserve focus
  const wrap = document.querySelector('.roster > div[style*="overflow-x"]');
  if (!wrap) return render();
  const inRegion = pbcState.region === 'All Regions' ? pbcRoster : pbcRoster.filter(d => d.region === pbcState.region);
  const filtered = inRegion.filter(d => {
    if (pbcState.search && !d.name.toLowerCase().includes(pbcState.search.toLowerCase())) return false;
    if (pbcState.stateFilter !== 'All States' && d.state !== pbcState.stateFilter) return false;
    if (pbcState.statusFilter !== 'All Statuses') {
      const filterMap = { 'Approved': 'locked', 'Pending': 'pending', 'Needs Review': 'review' };
      const slug = filterMap[pbcState.statusFilter] || pbcState.statusFilter.toLowerCase().replace(' ', '-');
      if (d.status !== slug) return false;
    }
    return true;
  });
  const rollup = ['East', 'Central', 'South', 'West', 'Exports'].map(r => {
    const dealers = pbcRoster.filter(d => d.region === r);
    const regVals = dealers.map(d => d.reg[2026]).filter(v => v != null && v > 0);
    const avg = regVals.length ? regVals.reduce((s, v) => s + v, 0) / regVals.length : 0;
    return { region: r, avg };
  });
  wrap.innerHTML = pbcState.mode === 'registrations'
    ? pbcRenderRegistrationsTable(filtered, rollup)
    : pbcRenderInvoicedTable(filtered);
  const countEl = document.querySelector('.roster-header-count');
  if (countEl) countEl.textContent = `·  ${filtered.length} of ${pbcRoster.length} dealers shown`;
}

function pbcCycleStatus(id) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  // Simplified review flow: Pending → Review → Approved → back to Pending
  const order = ['pending', 'review', 'locked'];
  // Map any legacy statuses into the simplified set
  const current = ['pending', 'review', 'locked'].includes(d.status) ? d.status : 'pending';
  const i = order.indexOf(current);
  d.status = order[(i + 1) % order.length];
  render();
}

function pbcUpdateField(id, field, value) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  // Block edits on locked dealers (only registrations side fields)
  if (d.adminLocked && ['override', 'notes'].includes(field)) {
    alert(`🔒 ${d.name} is locked. Request admin unlock to edit.`);
    render();
    return;
  }
  d[field] = value;
}

function pbcUpdateNum(id, field, value) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  // Block edits to the locked avg if dealer is admin-locked
  if (d.adminLocked && field === 'locked2027Avg') {
    alert(`🔒 ${d.name} is locked. Request admin unlock to edit the 2027 Avg Deal.`);
    render();
    return;
  }
  const num = parseFloat(value);
  d[field] = isNaN(num) ? null : num;
  // Re-render so derived values (co-op, growth, etc.) refresh
  render();
}

function pbcDelete(id) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  if (!confirm(`Delete ${d.name}? This cannot be undone.`)) return;
  pbcRoster = pbcRoster.filter(x => x.id !== id);
  render();
}

// SUBMIT / UNSUBMIT — Invoiced side
// Submitting means the dealer has signed and confirmed their pre-booking.
// Until submitted, the locked2027 amount does NOT roll into the Dashboard or Area View totals.
function pbcSubmit(id) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  if (!d.locked2027) {
    alert(`Cannot submit ${d.name} — 2027 Target must be set first.`);
    return;
  }
  if (!confirm(
    `Submit ${d.name}'s 2027 pre-booking of $${Number(d.locked2027).toLocaleString()}?\n\n` +
    `This confirms the dealer has signed their commitment. ` +
    `Once submitted, this amount rolls into the Dashboard and Area View totals network-wide.`
  )) return;
  d.submitted = true;
  d.submittedAt = new Date().toISOString();
  render();
}

function pbcUnsubmit(id) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  if (!confirm(
    `Withdraw ${d.name}'s submission?\n\n` +
    `Their $${Number(d.locked2027 || 0).toLocaleString()} commitment will be removed from the Dashboard and Area View totals until re-submitted.`
  )) return;
  d.submitted = false;
  d.submittedAt = null;
  render();
}

// LOCK / UNLOCK — Registrations side
function pbcLockDealer(id) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  if (!d.locked2027Avg) {
    alert(`Cannot lock ${d.name} — 2027 Avg Deal must be set first.`);
    return;
  }
  if (!confirm(`Lock ${d.name}'s 2027 Avg Deal at $${Number(d.locked2027Avg).toLocaleString()}?\n\nOnce locked, this row cannot be edited until an admin approves an unlock request.`)) return;
  d.adminLocked = true;
  d.lockedAt = new Date().toISOString();
  render();
}

function pbcRequestUnlock(id) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  // Admin gate — in production this would be tied to user role + audit log
  const code = prompt(
    `🔒 UNLOCK REQUEST — ${d.name}\n\n` +
    `This dealer's 2027 numbers are locked. Unlocking requires admin approval.\n\n` +
    `Enter the admin approval code to proceed:`
  );
  if (code === null) return; // cancelled
  if (code !== 'ADMIN-2027') {
    alert(`❌ Invalid admin code. Unlock denied.\n\nContact the Sales Operations admin to receive the current approval code.`);
    return;
  }
  if (!confirm(`✅ Admin code accepted. Unlock ${d.name}?`)) return;
  d.adminLocked = false;
  d.lockedAt = null;
  render();
}

function pbcOpenAdd(id) {
  pbcState.editingId = id || null;
  const modal = document.getElementById('dealerModal');
  document.getElementById('modalTitle').textContent = id ? 'EDIT DEALER' : 'ADD DEALER';
  // Reset all fields
  const fields = ['m_name','m_state','m_override','m_notes','m_locked','m_2021','m_2022','m_2023','m_2024','m_2025','m_2026'];
  fields.forEach(f => { const el = document.getElementById(f); if (el) el.value = ''; });
  document.getElementById('m_region').value = pbcState.region === 'All Regions' ? 'East' : pbcState.region;
  document.getElementById('m_status').value = 'pending';
  if (id) {
    const d = pbcRoster.find(x => x.id === id);
    document.getElementById('m_name').value = d.name;
    document.getElementById('m_region').value = d.region;
    document.getElementById('m_state').value = d.state;
    [2023,2024,2025,2026].forEach(y => { const el = document.getElementById('m_' + y); if (el) el.value = d.reg[y] || ''; });
    document.getElementById('m_locked').value = d.locked2027 || '';
    document.getElementById('m_status').value = d.status;
    document.getElementById('m_override').value = d.override || '';
    document.getElementById('m_notes').value = d.notes || '';
  }
  modal.classList.add('open');
}

function closeDealerModal() {
  document.getElementById('dealerModal').classList.remove('open');
  pbcState.editingId = null;
}

function saveDealer() {
  const name = document.getElementById('m_name').value.trim();
  if (!name) { alert('Dealer name is required.'); return; }
  const data = {
    name,
    region: document.getElementById('m_region').value,
    state: document.getElementById('m_state').value.trim(),
    counties: 0,
    ranchers: 0,
    reg: {},
    inv: {},
    locked2027: parseFloat(document.getElementById('m_locked').value) || null,
    status: document.getElementById('m_status').value,
    override: document.getElementById('m_override').value.trim(),
    notes: document.getElementById('m_notes').value.trim(),
  };
  [2023,2024,2025,2026].forEach(y => {
    const v = parseFloat(document.getElementById('m_' + y).value);
    data.reg[y] = isNaN(v) ? null : v;
    data.inv[y] = isNaN(v) ? null : v * 25; // rough placeholder if no inv data provided
  });
  if (pbcState.editingId) {
    const d = pbcRoster.find(x => x.id === pbcState.editingId);
    Object.assign(d, data);
  } else {
    const newId = Math.max(0, ...pbcRoster.map(d => d.id)) + 1;
    pbcRoster.push({ id: newId, ...data });
  }
  closeDealerModal();
  render();
}

function pbcExportCSV() {
  const headers = ['Dealer','State','Region','TM','Counties','Ranchers',
    'Reg2023','Reg2024','Reg2025','Reg2026',
    'Inv2023','Inv2024','Inv2025','Inv2026',
    '2027 Locked','Override','Status','Notes'];
  const rows = pbcRoster.map(d => [
    `"${d.name.replace(/"/g, '""')}"`,
    d.state, d.region, PBC_TMS[d.region],
    d.counties, d.ranchers,
    d.reg[2023]||'', d.reg[2024]||'', d.reg[2025]||'', d.reg[2026]||'',
    d.inv[2023]||'', d.inv[2024]||'', d.inv[2025]||'', d.inv[2026]||'',
    d.locked2027||'',
    `"${(d.override||'').replace(/"/g, '""')}"`,
    d.status,
    `"${(d.notes||'').replace(/"/g, '""')}"`,
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `arrowquip-prebooking-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { alert('CSV file appears empty.'); return; }
    let added = 0;
    for (let i = 1; i < lines.length; i++) {
      const cells = lines[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
      const c = cells.map(x => x.replace(/^"|"$/g, '').replace(/""/g, '"'));
      if (c.length < 3) continue;
      const id = Math.max(0, ...pbcRoster.map(d => d.id)) + added + 1;
      pbcRoster.push({
        id,
        name: c[0] || 'Unnamed',
        state: c[1] || '',
        region: c[2] || 'East',
        counties: parseInt(c[4]) || 0,
        ranchers: parseInt(c[5]) || 0,
        reg: { 2023: parseFloat(c[6])||null, 2024: parseFloat(c[7])||null, 2025: parseFloat(c[8])||null, 2026: parseFloat(c[9])||null },
        inv: { 2023: parseFloat(c[10])||null, 2024: parseFloat(c[11])||null, 2025: parseFloat(c[12])||null, 2026: parseFloat(c[13])||null },
        locked2027: parseFloat(c[14]) || null,
        override: c[15] || '',
        status: (c[16] || 'pending').toLowerCase(),
        notes: c[17] || '',
      });
      added++;
    }
    alert(`Imported ${added} dealer${added !== 1 ? 's' : ''}.`);
    e.target.value = '';
    render();
  };
  reader.readAsText(file);
}

// Master sheet handlers
function masterSetSearch(v) {
  masterState.search = v;
  // partial re-render to keep focus
  const tbody = document.querySelector('.master-table tbody');
  if (!tbody) return render();
  let visible = pbcRoster;
  if (masterState.region !== 'All Regions') visible = visible.filter(d => d.region === masterState.region);
  if (masterState.search) {
    const q = masterState.search.toLowerCase();
    visible = visible.filter(d => d.name.toLowerCase().includes(q) || (d.state || '').toLowerCase().includes(q) || (d.region || '').toLowerCase().includes(q));
  }
  if (masterState.showLocked === 'locked') visible = visible.filter(d => d.adminLocked);
  if (masterState.showLocked === 'unlocked') visible = visible.filter(d => !d.adminLocked);
  // Quick update: just toggle row visibility instead of full rebuild
  document.querySelectorAll('.master-table tbody tr[data-id]').forEach(tr => {
    const id = parseInt(tr.dataset.id);
    tr.style.display = visible.some(d => d.id === id) ? '' : 'none';
  });
  const meta = document.querySelector('.master-sheet-meta');
  if (meta) meta.textContent = `${visible.length} of ${pbcRoster.length} dealers · ${Object.keys(pbcRoster[0] || {}).length} fields per record`;
}
function masterSetRegion(v) { masterState.region = v; render(); }
function masterSetLockFilter(v) { masterState.showLocked = v; render(); }

function masterUpdate(id, field, value, type) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  if (d.adminLocked) {
    alert(`🔒 ${d.name} is locked. Request admin unlock to edit.`);
    render();
    return;
  }
  if (type === 'number') {
    const num = parseFloat(value);
    d[field] = isNaN(num) ? null : num;
  } else {
    d[field] = value;
  }
  // Re-render derived columns when fields with computed dependencies change:
  // - region: changes TM initials
  // - locked2027: changes Tier + Co-op $
  if (field === 'region' || field === 'locked2027') render();
}

function masterUpdateNested(id, group, year, value) {
  const d = pbcRoster.find(x => x.id === id);
  if (!d) return;
  if (d.adminLocked) {
    alert(`🔒 ${d.name} is locked. Request admin unlock to edit.`);
    render();
    return;
  }
  const num = parseFloat(value);
  d[group][year] = isNaN(num) ? null : num;
}

// ============================================================
function render() {
  const content = document.getElementById('page-content');
  let html = '';
  switch (state.page) {
    case 'dashboard': html = renderDashboard(); break;
    case 'areas': html = renderAreaView(); break;
    case 'calculator': html = renderCalculator(); break;
    case 'tiers': html = renderTiers(); break;
    case 'coop': html = renderCoop(); break;
    case 'portal': html = renderDealerPortal(); break;
    case 'settings': html = renderSettings(); break;
  }
  content.innerHTML = html;
  renderNav();
}

function renderNav() {
  const nav = document.getElementById('sidenav');
  nav.innerHTML = NAV.map(n => `
    <button class="${state.page === n.id ? 'active' : ''}" onclick="setPage('${n.id}')">
      ${ICON[n.icon]}
      <span>${n.label}</span>
      ${state.page === n.id ? `<span class="chev">${ICON.chev}</span>` : ''}
    </button>
  `).join('');

  const mobileNav = document.getElementById('mobileNav');
  mobileNav.innerHTML = NAV.map(n => `<option value="${n.id}" ${state.page === n.id ? 'selected' : ''}>${n.label}</option>`).join('');
  mobileNav.onchange = e => setPage(e.target.value);
}

function setPage(p) { state.page = p; render(); }
function setArea(a) { state.area = a; render(); }
function setProgramYear(y) { state.programYear = y; render(); }
function setCalcAreaFilter(a) { state.calcAreaFilter = a; render(); }
function setTierYear(y) { state.tierYear = y; render(); }
function setCoopAreaFilter(a) { state.coopAreaFilter = a; render(); }
function selectDealer(id) {
  state.selectedDealerId = id;
  const d = DEALERS.find(x => x.id === id);
  state.calcRanchers = d.ranchers;
  state.calcAvgDeal = d.avg[2026];
  render();
}
function updateSearch(v) {
  state.calcSearch = v;
  // Only re-render the dealer list, not the whole page (keep focus)
  const list = document.querySelector('.calc-list');
  if (list) {
    const filtered = DEALERS.filter(d =>
      (state.calcAreaFilter === 'All Areas' || d.area === state.calcAreaFilter) &&
      d.name.toLowerCase().includes(state.calcSearch.toLowerCase())
    );
    list.innerHTML = filtered.map(d => `
      <button class="dealer-item ${state.selectedDealerId === d.id ? 'selected' : ''}" onclick="selectDealer(${d.id})">
        <div>
          <div class="dealer-item-name">${d.name}</div>
          <div class="dealer-item-meta">${d.area} · ${d.counties} ${d.counties === 1 ? 'county' : 'counties'}</div>
        </div>
        ${state.selectedDealerId === d.id ? `<span style="color:var(--aq-red);">${ICON.chev}</span>` : ''}
      </button>
    `).join('');
  }
}
function updateRanchers(v) {
  state.calcRanchers = Number(v);
  updateCalcOutputs();
}
function updateAvgDeal(v) {
  state.calcAvgDeal = Number(v);
  updateCalcOutputs();
}
function updatePenetration(v) {
  state.calcPenetration = Number(v);
  updateCalcOutputs();
  const sv = document.querySelector('.slider-value');
  if (sv) sv.textContent = state.calcPenetration.toFixed(1) + '%';
}
function resetPenetration() {
  state.calcPenetration = 1.5;
  render();
}
function updateCalcOutputs() {
  const target = state.calcRanchers * state.calcAvgDeal * (state.calcPenetration / 100);
  const loads = target / LOAD_VALUE;
  const tier = getTier(target, 2027);
  const coop = target * (tier.coopPct / 100);

  const hero = document.querySelector('.hero-output-value');
  const heroSub = document.querySelector('.hero-output-sub');
  const outputs = document.querySelectorAll('.output-stack .card .stat-card-value');
  const breakdownRows = document.querySelectorAll('.breakdown-row');

  if (hero) hero.textContent = currency(target);
  if (heroSub) heroSub.textContent = currencyFull(target);
  if (outputs[0]) outputs[0].textContent = loads.toFixed(1);
  if (outputs[1]) outputs[1].textContent = tier.tier;
  if (outputs[2]) outputs[2].textContent = currencyFull(coop);

  const subs = document.querySelectorAll('.output-stack .card .stat-card-sublabel');
  if (subs[1]) subs[1].textContent = `${tier.coopPct}% co-op rate`;
  if (subs[2]) subs[2].textContent = `Target × ${tier.coopPct}% (${tier.tier} tier)`;

  if (breakdownRows.length >= 4) {
    breakdownRows[0].children[1].textContent = Number(state.calcRanchers).toLocaleString();
    breakdownRows[1].children[1].textContent = currencyFull(state.calcAvgDeal);
    breakdownRows[2].children[1].textContent = state.calcPenetration.toFixed(1) + '%';
    breakdownRows[3].children[1].textContent = currencyFull(target);
  }
}

// INIT
render();
</script>

        <div class="modal-input-group full">
          <label>Override Reason</label>
          <input type="text" id="m_override" placeholder="Optional context for the lock" />
        </div>
        <div class="modal-input-group full">
          <label>Notes</label>
          <input type="text" id="m_notes" placeholder="Optional notes" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="filter-btn" onclick="closeDealerModal()">Cancel</button>
      <button class="filter-btn primary" onclick="saveDealer()">Save Dealer</button>
    </div>
  </div>
</div>

<!-- IMPORT FILE INPUT (hidden) -->
<input type="file" id="importFile" accept=".csv" style="display:none;" onchange="handleImportFile(event)" />

</body>
</html>
