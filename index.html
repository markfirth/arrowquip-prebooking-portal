/* ===================== DEALER VISIT WORKFLOW =====================
   The visit report is text (VISIT, in the plan) plus device-local photos (IndexedDB).
   Photos never leave the device until secure auth enables cloud sync — so no anon
   storage, no image bytes in the plan JSON. Receipts are explicitly NOT built here. */

/* ---- dealer visit photos: private 'visit-photos' bucket is the source of truth ----
   The bucket (indexed by prebooking_documents) holds the authoritative copy so photos
   follow the trip across devices and into pulled reports. IndexedDB is a local cache +
   upload queue: every photo is written locally first (offline-first) and each local row
   records its cloud storage_path once uploaded, so the cache and cloud never double-count.
   Images never touch plan/report JSON. */
var _pdb=null;
function pbPhotoDB(){
  return new Promise(function(res,rej){
    if(_pdb) return res(_pdb);
    if(!('indexedDB' in window)) return rej('no-idb');
    var r=indexedDB.open('aq-visit-photos',1);
    r.onupgradeneeded=function(e){ var db=e.target.result;
      if(!db.objectStoreNames.contains('photos')){
        var s=db.createObjectStore('photos',{keyPath:'id',autoIncrement:true});
        s.createIndex('dealer','dealer',{unique:false});
      }
    };
    r.onsuccess=function(e){ _pdb=e.target.result; res(_pdb); };
    r.onerror=function(){ rej('idb-open-failed'); };
  });
}
/* record the cloud storage_path back onto a local row once its upload succeeds */
function pbPhotoSetRemote(localId, remotePath){
  if(localId==null) return Promise.resolve();
  return pbPhotoDB().then(function(db){ return new Promise(function(res){
    var st=db.transaction('photos','readwrite').objectStore('photos'), g=st.get(localId);
    g.onsuccess=function(){ var rec=g.result; if(rec){ rec.remotePath=remotePath; st.put(rec); } res(); };
    g.onerror=function(){ res(); };
  });}).catch(function(){});
}
/* upload one blob to the private bucket + index row, then link it to its local row */
function pbPhotoUploadOne(dealer, blob, localId){
  var d=uniById(dealer);
  return pbUpload('visit-photos', blob, {kind:'visit_photo', stopKey:String(dealer),
      title:(d&&d.name?('Visit photo — '+d.name):'Visit photo'), source:'visit'})
    .then(function(r){ if(r&&r.ok) return pbPhotoSetRemote(localId, r.bucket+'/'+r.path); })
    .catch(function(){});
}
function pbPhotoAdd(dealer, blob){
  /* write the local cache/queue row first (works offline & signed-out), then upload */
  return pbPhotoDB().then(function(db){ return new Promise(function(res,rej){
    var tx=db.transaction('photos','readwrite');
    var req=tx.objectStore('photos').add({dealer:dealer, blob:blob, at:Date.now(), remotePath:null});
    var newId=null; req.onsuccess=function(){ newId=req.result; };
    tx.oncomplete=function(){ res(newId); }; tx.onerror=function(){ rej('add-failed'); };
  });}).then(function(localId){
    if(pbAuthed()) return pbPhotoUploadOne(dealer, blob, localId).then(function(){ return localId; });
    return localId;
  });
}
/* cloud photos for a dealer: index rows -> short-lived signed URLs */
function pbCloudPhotoList(dealer){
  if(!pbAuthed() || !SB || (typeof navigator!=='undefined' && !navigator.onLine)) return Promise.resolve([]);
  return SB.from('prebooking_documents')
    .select('id,storage_path,created_at').eq('kind','visit_photo').eq('stop_key',String(dealer))
    .order('created_at',{ascending:true})
    .then(function(res){
      var rows=(res&&res.data)||[]; if(!rows.length) return [];
      return Promise.all(rows.map(function(row){
        var sp=row.storage_path||'', i=sp.indexOf('/'); if(i<0) return null;
        return SB.storage.from(sp.slice(0,i)).createSignedUrl(sp.slice(i+1), 3600).then(function(s){
          return (s&&s.data&&s.data.signedUrl)
            ? {kind:'cloud', docId:row.id, storagePath:sp, url:s.data.signedUrl, at:(new Date(row.created_at).getTime()||0)}
            : null;
        }).catch(function(){ return null; });
      })).then(function(list){ return list.filter(Boolean); });
    }, function(){ return []; });
}
/* local rows for a dealer as display items */
function pbLocalPhotoRows(dealer){
  return pbPhotoDB().then(function(db){ return new Promise(function(res){
    var out=[], idx=db.transaction('photos','readonly').objectStore('photos').index('dealer').openCursor(IDBKeyRange.only(dealer));
    idx.onsuccess=function(e){ var c=e.target.result; if(c){ out.push({kind:'local', localId:c.value.id, remotePath:c.value.remotePath||null, url:URL.createObjectURL(c.value.blob), at:c.value.at||0}); c.continue(); } else res(out); };
    idx.onerror=function(){ res(out); };
  });}).catch(function(){ return []; });
}
/* merged view: cloud is authoritative; a local row already uploaded (remotePath in the
   cloud set) is hidden to avoid duplicates; local rows not yet uploaded still show. */
function pbPhotoList(dealer){
  return Promise.all([pbLocalPhotoRows(dealer), pbCloudPhotoList(dealer)]).then(function(r){
    var loc=r[0], cloud=r[1], have={};
    cloud.forEach(function(c){ have[c.storagePath]=true; });
    var pending=loc.filter(function(l){ return !(l.remotePath && have[l.remotePath]); });
    var all=cloud.concat(pending).sort(function(a,b){ return (a.at||0)-(b.at||0); });
    return all.map(function(p){ return { id:(p.kind==='cloud'?('c:'+p.docId):('l:'+p.localId)), url:p.url, at:p.at }; });
  });
}
function pbPhotoDeleteLocal(localId){
  return pbPhotoDB().then(function(db){ return new Promise(function(res){
    var tx=db.transaction('photos','readwrite'); tx.objectStore('photos').delete(localId); tx.oncomplete=res; tx.onerror=res;
  });}).catch(function(){});
}
function pbPhotoDeleteLocalByRemote(remotePath){
  if(!remotePath) return Promise.resolve();
  return pbPhotoDB().then(function(db){ return new Promise(function(res){
    var st=db.transaction('photos','readwrite').objectStore('photos'), cur=st.openCursor();
    cur.onsuccess=function(e){ var c=e.target.result; if(c){ if(c.value.remotePath===remotePath) st.delete(c.value.id); c.continue(); } else res(); };
    cur.onerror=function(){ res(); };
  });}).catch(function(){});
}
/* delete a merged item: id 'c:<docId>' removes the cloud object + index row (and any
   cached local copy); 'l:<localId>' removes a local-only row. */
function pbPhotoDelete(compositeId){
  var s=String(compositeId);
  if(s.indexOf('c:')===0){
    var docId=s.slice(2);
    return SB.from('prebooking_documents').select('storage_path').eq('id',docId).maybeSingle().then(function(res){
      var sp=(res&&res.data&&res.data.storage_path)||'', i=sp.indexOf('/');
      var rm=(i>=0) ? SB.storage.from(sp.slice(0,i)).remove([sp.slice(i+1)]) : Promise.resolve();
      return rm.then(function(){ return SB.from('prebooking_documents').delete().eq('id',docId); })
               .then(function(){ return pbPhotoDeleteLocalByRemote(sp); });
    }).catch(function(){});
  }
  if(s.indexOf('l:')===0) return pbPhotoDeleteLocal(+s.slice(2));
  return pbPhotoDeleteLocal(+s); /* legacy numeric ids */
}
/* one-time, idempotent backfill: push any local rows without a remotePath to the cloud.
   Runs on login and when connectivity returns; already-uploaded rows are skipped, so it
   is safe to call repeatedly and also drains photos captured while offline. */
var _pbBackfilling=false;
function pbPhotoBackfill(){
  if(_pbBackfilling || !pbAuthed() || !SB || (typeof navigator!=='undefined' && !navigator.onLine)) return;
  _pbBackfilling=true;
  pbPhotoDB().then(function(db){ return new Promise(function(res){
    var out=[], cur=db.transaction('photos','readonly').objectStore('photos').openCursor();
    cur.onsuccess=function(e){ var c=e.target.result; if(c){ if(!c.value.remotePath) out.push({id:c.value.id, dealer:c.value.dealer, blob:c.value.blob}); c.continue(); } else res(out); };
    cur.onerror=function(){ res(out); };
  });}).then(function(pending){
    if(!pending.length){ _pbBackfilling=false; return; }
    try{ cloudBadge('Backing up '+pending.length+' photo'+(pending.length>1?'s':'')+'…'); }catch(e){}
    var i=0, step=function(){
      if(i>=pending.length){ _pbBackfilling=false; try{ cloudBadge('Photos backed up'); }catch(e){} return; }
      var p=pending[i++]; pbPhotoUploadOne(p.dealer, p.blob, p.id).then(step, step);
    };
    step();
  }, function(){ _pbBackfilling=false; });
}
/* union count (cloud rows + not-yet-uploaded local rows); no object URLs */
function pbPhotoCount(dealer){
  var cloudP=(pbAuthed() && SB && (typeof navigator==='undefined' || navigator.onLine))
    ? SB.from('prebooking_documents').select('id',{count:'exact',head:true}).eq('kind','visit_photo').eq('stop_key',String(dealer))
        .then(function(r){ return (r&&typeof r.count==='number')?r.count:0; }, function(){ return 0; })
    : Promise.resolve(0);
  var localP=pbPhotoDB().then(function(db){ return new Promise(function(res){
    var n=0, cur=db.transaction('photos','readonly').objectStore('photos').index('dealer').openCursor(IDBKeyRange.only(dealer));
    cur.onsuccess=function(e){ var c=e.target.result; if(c){ if(!c.value.remotePath) n++; c.continue(); } else res(n); };
    cur.onerror=function(){ res(0); };
  });}).catch(function(){ return 0; });
  return Promise.all([cloudP, localP]).then(function(r){ return r[0]+r[1]; }).catch(function(){ return 0; });
}

  var comp=document.getElementById('vd_complete');
  if(comp) comp.onclick=function(){ APPT[id]=!APPT[id]; if(!APPT[id])delete APPT[id]; savePlan(); w.remove(); renderMobile(); };

  /* photos tab: load thumbnails from IndexedDB, wire capture */
  if(MOB._visitTab==='photos'){
    var grid=document.getElementById('vd_photos');
    pbPhotoList(id).then(function(ps){
      grid.innerHTML = ps.length
        ? ps.map(function(p){ return '<div class="vd-ph"><img src="'+p.url+'" alt=""><button class="vd-phdel" data-phdel="'+p.id+'">×</button></div>'; }).join('')
        : '<div class="tm-empty" style="grid-column:1/-1">No photos yet. Tap Add photo.</div>';
      grid.querySelectorAll('[data-phdel]').forEach(function(b){ b.onclick=function(){ if(!confirm('Delete this photo? If it has synced, this removes it from cloud storage too.')) return; pbPhotoDelete(b.dataset.phdel).then(function(){ reopen('photos'); }); }; });
    });
    var cam=document.getElementById('vd_cam');
    if(cam) cam.onchange=function(){
      var files=[].slice.call(cam.files||[]); if(!files.length) return;
      Promise.all(files.map(function(f){ return pbPhotoAdd(id,f); })).then(function(){ reopen('photos'); });
    };
  }
}

function mobDealerSheet(id){
  var labs=dayLabels(MOB.wk);
  var inner=mobField('Day','<select id="md_day"><option value="">— day —</option>'
      +labs.map(function(l,i){return '<option value="'+i+'"'+(DAY[id]===i?' selected':'')+'>'+l[0]+', '+l[1]+'</option>';}).join('')+'</select>')
    +mobField('Time','<input id="md_time" type="time" value="'+esc(TIME[id]||'')+'">')
    +mobField('Duration (minutes)','<input id="md_dur" type="number" step="15" value="'+(DUR[id]||90)+'">')
    +'<button class="tm-primary" id="md_save">Save</button>';
  var d=uniById(id);
  var w=mobSheet(d?d.name:'Dealer visit', inner);
  document.getElementById('md_save').onclick=function(){
    var dv=document.getElementById('md_day').value;
    DAY[id]=(dv===''?null:parseInt(dv,10));
    TIME[id]=document.getElementById('md_time').value;
    DUR[id]=parseInt(document.getElementById('md_dur').value,10)||90;
    savePlan(); w.remove(); renderMobile();
  };
}
function mobExpenseSheet(prefill){
  prefill=prefill||{};
  var labs=dayLabels(MOB.wk);
  var inner=(prefill.docId?'<div style="font-size:12px;color:#1d4ed8;background:#eff6ff;border-radius:8px;padding:8px 10px;margin-bottom:10px">Draft from your receipt — review the details, then save. Nothing is final until you confirm.</div>':'')
    +mobField('Category','<select id="me_cat">'+BUDGET_CATS.map(function(c){return '<option'+(normCat(prefill.cat||'')===c?' selected':'')+'>'+esc(c)+'</option>';}).join('')+'</select>')
    +mobField('Vendor','<input id="me_vendor" placeholder="Shell, Hampton Inn…" value="'+esc(prefill.vendor||'')+'">')
    +mobField('Amount','<input id="me_amount" type="number" step="0.01" inputmode="decimal" placeholder="0.00" value="'+esc(prefill.amount!=null?String(prefill.amount):'')+'">')
    +mobField('Day','<select id="me_day"><option value="">— day —</option>'+labs.map(function(l,i){return '<option value="'+i+'">'+l[0]+', '+l[1]+'</option>';}).join('')+'</select>')
    +mobField('Type','<select id="me_type"><option value="actual">Actual</option><option value="estimate">Estimate</option></select>')
    +mobField('Notes','<input id="me_notes" value="'+esc(prefill.notes||'')+'">')
    +'<button class="tm-primary" id="me_save">'+(prefill.docId?'Confirm & add expense':'Add expense')+'</button>';
  var w=mobSheet(prefill.docId?'Review Receipt':'Add Expense', inner);
  document.getElementById('me_save').onclick=function(){
    var amt=document.getElementById('me_amount').value;
    if(amt===''||!isFinite(parseFloat(amt))){ alert('Enter an amount.'); return; }
    var prevTerr=terr; terr=MOB.terr;
    var expId=addExpense(MOB.terr, MOB.wk, {
      cat:document.getElementById('me_cat').value,
      vendor:document.getElementById('me_vendor').value,
      date:document.getElementById('me_day').value,
      isEst:(document.getElementById('me_type').value==='estimate'),
      amount:amt, notes:document.getElementById('me_notes').value});
    terr=prevTerr;
    /* the receipt image stays attached to the expense it created */
    if(prefill.docId&&expId){ pbDocStatus(prefill.docId,{expense_ids:[expId],approval_status:'entered'}); }
    w.remove(); renderMobile();
  };
}

/* boot: only on phone widths, and only after the passcode gate unlocks */
function mobBoot(){
  if(!mobIsPhone()) return;
  var cur=mobCurrentWeek();
  if(cur!=null) MOB.wk=cur;                    /* always open on the week containing today */
  else { var weeks=mobWeeks(MOB.terr); if(weeks.length && weeks.indexOf(MOB.wk)<0) MOB.wk=weeks[0]; }
  renderMobile();
}
window.addEventListener('resize',function(){
  var host=document.getElementById('tripmode');
  if(mobIsPhone()){ if(host && !host.innerHTML) mobBoot(); }
});
/* service worker: only over https (or localhost) */
if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='127.0.0.1'||location.hostname==='localhost')){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('/sw.js').catch(function(){}); });
}
